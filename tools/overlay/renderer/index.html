<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Leyline Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', 'Menlo', monospace;
    font-size: 11px;
    background: transparent;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
  }
  #root {
    background: rgba(0, 0, 0, 0.75);
    border-left: 1px solid rgba(255, 255, 255, 0.1);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #status {
    padding: 6px 8px;
    font-weight: 700;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .panel-header {
    padding: 4px 8px;
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8888aa;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  #idmap-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  #idmap-list {
    flex: 1;
    overflow-y: auto;
    padding: 2px 0;
  }
  .id-row {
    display: flex;
    gap: 6px;
    padding: 1px 8px;
    white-space: nowrap;
  }
  .id-row .iid { color: #8888aa; width: 40px; text-align: right; }
  .id-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .id-row .zone { width: 36px; text-align: center; font-weight: 700; }
  .id-row .tap { width: 12px; text-align: center; }

  .zone-bf { color: #56c596; }
  .zone-hand { color: #4ea8de; }
  .zone-gy { color: #e94560; }
  .zone-stack { color: #f4845f; }
  .zone-exile { color: #8888aa; }
  #log-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #log-list {
    flex: 1;
    overflow-y: auto;
    padding: 2px 0;
  }
  .log-row {
    padding: 1px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-error { color: #e94560; }
  .log-warn { color: #f7d354; }
  .log-info { color: #e0e0e0; }
  .log-debug { color: #666680; }
</style>
</head>
<body>
  <div id="root">
    <div id="status">Waiting for server…</div>
    <div id="idmap-panel">
      <div class="panel-header">ID Map</div>
      <div id="idmap-list"></div>
    </div>
    <div id="log-panel">
      <div class="panel-header">Logs</div>
      <div id="log-list"></div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
