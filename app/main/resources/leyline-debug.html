<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arena Debug Panel</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --bg3: #0f3460;
    --fg: #e0e0e0;
    --fg2: #8888aa;
    --accent: #e94560;
    --blue: #4ea8de;
    --green: #56c596;
    --red: #e94560;
    --orange: #f4845f;
    --yellow: #f7d354;
    --purple: #a78bfa;
    --mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
    --border: #2a2a4e;
  }
  [x-cloak] { display: none !important; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header h1 { font-size: 14px; color: var(--accent); font-weight: 700; }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill-phase { background: var(--bg3); color: var(--yellow); }
  .pill-turn { background: var(--bg3); color: var(--blue); }
  .pill-active { background: var(--bg3); color: var(--green); }
  .pill-count { background: var(--bg3); color: var(--fg2); }
  #header .spacer { flex: 1; }
  .header-btn {
    background: var(--bg3);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
  }
  .header-btn:hover { background: var(--accent); }
  .header-btn.paused { background: var(--red); color: #fff; }
  .header-btn.active-purple:hover { background: var(--purple); }
  .header-btn.active-purple.on { background: var(--purple); color: #fff; }

  /* Main layout */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Timeline */
  #timeline {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .entry {
    border-left: 3px solid var(--border);
    padding: 6px 10px;
    margin-bottom: 2px;
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 0 4px 4px 0;
  }
  .entry:hover { background: var(--bg2); }
  .entry.dir-in { border-left-color: var(--blue); }
  .entry.dir-out { border-left-color: var(--green); }
  .entry-header {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .dir-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    min-width: 28px;
    text-align: center;
  }
  .dir-in .dir-badge { background: var(--blue); color: var(--bg); }
  .dir-out .dir-badge { background: var(--green); color: var(--bg); }
  .type-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--bg3);
    color: var(--fg);
    font-weight: 600;
    cursor: pointer;
  }
  .type-badge:hover { opacity: 0.6; }
  .type-GameStateMessage { color: var(--yellow); }
  .type-ActionsAvailableReq { color: var(--orange); }
  .type-PerformActionResp { color: var(--purple); }
  .type-DeclareAttackersReq, .type-DeclareAttackersResp { color: var(--red); }
  .type-DeclareBlockersReq, .type-DeclareBlockersResp { color: var(--red); }
  .entry-summary { color: var(--fg2); font-size: 11px; }
  .entry-meta { color: var(--fg2); font-size: 10px; opacity: 0.6; }
  .entry-ids {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .iid-chip {
    font-size: 9px;
    padding: 0 4px;
    border-radius: 3px;
    background: var(--bg3);
    color: var(--fg2);
    cursor: pointer;
  }
  .iid-chip:hover { background: var(--accent); color: #fff; }
  .iid-chip.highlight { background: var(--accent); color: #fff; }
  .entry.highlight { background: rgba(233, 69, 96, 0.15); }

  /* JSON tree */
  .json-wrap {
    margin-top: 6px;
    padding: 8px;
    background: var(--bg2);
    border-radius: 4px;
    overflow-x: auto;
    max-height: 400px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.5;
  }
  .json-key { color: var(--blue); }
  .json-str { color: var(--green); }
  .json-num { color: var(--orange); }
  .json-bool { color: var(--purple); }
  .json-null { color: var(--fg2); }
  .json-bracket { color: var(--fg2); }
  .json-toggle {
    cursor: pointer;
    user-select: none;
  }
  .json-toggle:hover { text-decoration: underline; }
  .json-node.json-collapsed > .json-children { display: none; }
  .json-node.json-collapsed > .json-toggle-row > .json-toggle::before { content: '\25b6 '; font-size: 9px; }
  .json-node.json-expanded > .json-toggle-row > .json-toggle::before { content: '\25bc '; font-size: 9px; }
  .json-iid { cursor: pointer; text-decoration: underline; }
  .json-iid:hover { color: var(--accent); }

  /* ID Panel (sidebar) */
  #id-panel {
    width: 340px;
    overflow-y: auto;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    padding: 8px;
    flex-shrink: 0;
  }
  #id-panel h2 {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  #id-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
  }
  #id-table th {
    text-align: left;
    padding: 3px 6px;
    color: var(--fg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg2);
  }
  #id-table td {
    padding: 3px 6px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.5);
  }
  .zone-Hand { color: var(--blue); }
  .zone-Library { color: var(--fg2); }
  .zone-Battlefield { color: var(--green); }
  .zone-Graveyard { color: var(--red); }
  .zone-Exile { color: var(--purple); }
  .zone-Stack { color: var(--orange); }
  #id-table tr { cursor: pointer; }
  #id-table tr:hover { background: var(--bg3); }
  #id-table tr.highlight { background: rgba(233, 69, 96, 0.15); }

  /* Disconnected banner */
  #disconnected-banner {
    display: none;
    background: var(--red);
    color: #fff;
    text-align: center;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  #disconnected-banner.visible { display: block; }

  /* Log panel */
  #log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    font-size: 11px;
    line-height: 1.6;
  }
  .log-row { display: flex; align-items: baseline; padding: 1px 6px; border-radius: 2px; }
  .log-row:hover { background: var(--bg2); }
  .log-ts { color: var(--fg2); opacity: 0.5; margin-right: 6px; white-space: nowrap; }
  .log-logger { color: var(--purple); margin-right: 6px; white-space: nowrap; }
  .log-thread { color: var(--fg2); opacity: 0.4; margin-right: 6px; font-size: 9px; white-space: nowrap; }
  .log-level { font-weight: 700; margin-right: 6px; min-width: 42px; white-space: nowrap; }
  .log-level-ERROR { color: var(--red); }
  .log-level-WARN { color: var(--orange); }
  .log-level-INFO { color: var(--green); }
  .log-level-DEBUG { color: var(--blue); }
  .log-level-TRACE { color: var(--fg2); }
  .log-msg { color: var(--fg); word-break: break-all; }
  .log-msg-ERROR { color: var(--red); }
  .log-msg-WARN { color: var(--orange); }

  /* Filter bars */
  .filter-bar {
    display: flex;
    gap: 6px;
    padding: 4px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }
  .filter-bar label { color: var(--fg2); font-size: 11px; }
  .filter-input {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    width: 200px;
  }
  .level-btn {
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
  }
  .level-btn.active { border-color: var(--fg2); }
  .level-btn[data-level="ERROR"] { color: var(--red); }
  .level-btn[data-level="ERROR"].active { background: var(--red); color: #fff; }
  .level-btn[data-level="WARN"] { color: var(--orange); }
  .level-btn[data-level="WARN"].active { background: var(--orange); color: #fff; }
  .level-btn[data-level="INFO"] { color: var(--green); }
  .level-btn[data-level="INFO"].active { background: var(--green); color: var(--bg); }
  .level-btn[data-level="DEBUG"] { color: var(--blue); }
  .level-btn[data-level="DEBUG"].active { background: var(--blue); color: var(--bg); }

  /* View toggle */
  .view-tab {
    padding: 2px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg2);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
  }
  .view-tab.active { background: var(--bg3); color: var(--fg); border-color: var(--fg2); }

  .toggle-btn {
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg2);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
  }
  .toggle-btn.active { background: var(--bg3); color: var(--fg); border-color: var(--fg2); }

  .clear-btn {
    background: var(--bg);
    color: var(--fg2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    margin-left: auto;
  }
  .clear-btn:hover { background: var(--accent); color: #fff; }

  /* State timeline */
  .st-row {
    border-left: 3px solid var(--border);
    padding: 4px 10px;
    margin-bottom: 1px;
    border-radius: 0 4px 4px 0;
    cursor: pointer;
  }
  .st-row:hover { background: var(--bg2); }
  .st-row.st-snapshot { border-left-color: var(--yellow); }
  .st-row.st-event { border-left-color: var(--purple); }
  .st-row.st-event-AUTO_PASS { border-left-color: var(--fg2); opacity: 0.6; }
  .st-row.st-event-GAME_OVER { border-left-color: var(--red); }
  .st-row.st-event-CLIENT_ACTION { border-left-color: var(--blue); }
  .st-header {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .st-gsid { color: var(--yellow); font-weight: 700; font-size: 11px; min-width: 42px; }
  .st-type { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--bg3); }
  .st-type-Full { color: var(--green); }
  .st-type-Diff { color: var(--blue); }
  .st-phase { color: var(--fg2); font-size: 11px; }
  .st-zones { color: var(--fg2); font-size: 10px; }
  .st-event-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--bg3);
    font-weight: 600;
  }
  .st-event-badge-AUTO_PASS { color: var(--fg2); }
  .st-event-badge-SEND_STATE { color: var(--green); }
  .st-event-badge-CLIENT_ACTION { color: var(--blue); }
  .st-event-badge-COMBAT_PROMPT { color: var(--red); }
  .st-event-badge-TARGET_PROMPT { color: var(--orange); }
  .st-event-badge-GAME_START { color: var(--yellow); }
  .st-event-badge-GAME_OVER { color: var(--red); }
  .st-event-badge-AI_TURN_WAIT { color: var(--fg2); }
  .st-event-badge-AI_TURN_TIMEOUT { color: var(--orange); }
  .st-event-badge-PRIORITY_GRANT { color: var(--purple); }
  .st-detail { color: var(--fg2); font-size: 11px; }
  .st-stack { color: var(--orange); font-size: 10px; }
  .st-priority { font-size: 10px; }
  .st-priority-human { color: var(--blue); }
  .st-priority-ai { color: var(--red); }

  /* Diff inline */
  .st-diff {
    margin: 4px 0 4px 48px;
    padding: 6px 10px;
    background: var(--bg2);
    border-radius: 4px;
    font-size: 11px;
    line-height: 1.6;
  }
  .st-diff-empty { color: var(--fg2); opacity: 0.5; font-style: italic; }
  .st-diff-zone { margin-bottom: 2px; }
  .st-diff-added { color: var(--green); }
  .st-diff-removed { color: var(--red); }
  .st-diff-modified { color: var(--orange); }
  .st-diff-phase { color: var(--yellow); }
  .st-diff-life { color: var(--accent); }

  /* Instance history popup */
  .st-history {
    margin: 4px 0 4px 48px;
    padding: 6px 10px;
    background: var(--bg2);
    border-radius: 4px;
    font-size: 11px;
    border: 1px solid var(--purple);
  }
  .st-history-row { padding: 1px 0; }

  /* Recordings view */
  #recordings-wrap {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #recordings-list {
    width: 320px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .rec-row {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.5);
    cursor: pointer;
  }
  .rec-row:hover { background: var(--bg3); }
  .rec-row.active { background: rgba(78, 168, 222, 0.2); border-left: 3px solid var(--blue); }
  .rec-title { color: var(--fg); font-size: 11px; font-weight: 700; }
  .rec-meta { color: var(--fg2); font-size: 10px; margin-top: 2px; }
  #recordings-main {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    position: relative;
  }
  .rec-summary {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    margin-bottom: 8px;
    font-size: 11px;
    line-height: 1.6;
  }
  .rec-actions {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }
  .rec-actions th {
    text-align: left;
    color: var(--fg2);
    border-bottom: 1px solid var(--border);
    padding: 4px 6px;
    position: sticky;
    top: 0;
    background: var(--bg);
  }
  .rec-actions td {
    border-bottom: 1px solid rgba(42, 42, 78, 0.5);
    padding: 4px 6px;
    vertical-align: top;
  }
  .rec-actions tr:hover { background: var(--bg2); }
  .rec-card { color: var(--yellow); }
  .rec-actor { color: var(--blue); }
  .rec-cat { color: var(--orange); font-weight: 700; }

  /* Compare columns */
  .compare-columns {
    display: flex;
    gap: 8px;
  }
  .compare-col {
    flex: 1;
    overflow-y: auto;
    max-height: calc(100vh - 200px);
    min-width: 0;
  }
  .compare-col-left { border-left: 3px solid var(--blue); padding-left: 6px; }
  .compare-col-right { border-left: 3px solid var(--orange); padding-left: 6px; }

  /* Copy buttons */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border: none;
    background: transparent;
    color: var(--fg2);
    cursor: pointer;
    border-radius: 3px;
    font-size: 11px;
    padding: 0;
    flex-shrink: 0;
    opacity: 0.4;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  .copy-btn:hover { opacity: 1; background: var(--bg3); color: var(--fg); }
  .copy-btn.copied { opacity: 1; color: var(--green); }
  .entry-header .copy-btn { width: 22px; height: 22px; font-size: 12px; opacity: 0.5; }
  .json-toggle-row { display: inline-flex; align-items: center; gap: 2px; }
</style>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body x-data="debugApp()" x-init="init()">

<!-- Header -->
<div id="header">
  <h1>Arena Debug</h1>
  <span class="pill pill-phase" x-text="state.phase || '\u2014'"></span>
  <span class="pill pill-turn" x-text="'T' + state.turn"></span>
  <span class="pill pill-active" x-text="state.activePlayer || '\u2014'"></span>
  <span class="pill pill-count" x-text="state.entryCount + ' msgs'"></span>
  <div class="spacer"></div>
  <button class="view-tab" :class="{ active: view === 'messages' }" @click="view = 'messages'">Messages</button>
  <button class="view-tab" :class="{ active: view === 'states' }" @click="view = 'states'">States</button>
  <button class="view-tab" :class="{ active: view === 'logs' }" @click="view = 'logs'">Logs</button>
  <button class="view-tab" :class="{ active: view === 'recordings' }" @click="view = 'recordings'; fetchRecordings()">Recordings</button>
  <button class="header-btn active-purple" :class="{ on: showIdPanel }" @click="showIdPanel = !showIdPanel; if (showIdPanel) fetchIdMap()">ID Map</button>
  <button class="header-btn" :class="{ paused }" @click="paused = !paused" x-text="paused ? 'Resume' : 'Pause'"></button>
</div>

<!-- Disconnected banner -->
<div id="disconnected-banner" :class="{ visible: !_sseConnected }">
  Server disconnected. Reconnecting...
</div>

<!-- Message filter bar -->
<div class="filter-bar" x-show="view === 'messages'" x-cloak>
  <label>Filter:</label>
  <input class="filter-input" type="text" placeholder="type or text..." x-model.debounce.150ms="msgFilter">
  <button class="toggle-btn" :class="{ active: showIn }" @click="showIn = !showIn">IN</button>
  <button class="toggle-btn" :class="{ active: showOut }" @click="showOut = !showOut">OUT</button>
  <button class="clear-btn" @click="entries = []; expanded = {}">Clear</button>
</div>

<!-- Log filter bar -->
<div class="filter-bar" x-show="view === 'logs'" x-cloak>
  <label>Level:</label>
  <template x-for="lvl in ['DEBUG','INFO','WARN','ERROR']" :key="lvl">
    <button class="level-btn" :data-level="lvl" :class="{ active: logLevels[lvl] }"
            @click="logLevels[lvl] = !logLevels[lvl]" x-text="lvl"></button>
  </template>
  <input class="filter-input" style="margin-left:auto" type="text" placeholder="filter logger or text..."
         x-model.debounce.150ms="logFilter">
</div>

<!-- Recordings filter bar -->
<div class="filter-bar" x-show="view === 'recordings'" x-cloak>
  <button class="view-tab" :class="{ active: recSubView === 'messages' }" @click="recSubView = 'messages'; if (selectedRecordingId && recordingMessages.length === 0) refreshRecordingMessages()">Messages</button>
  <button class="view-tab" :class="{ active: recSubView === 'actions' }" @click="recSubView = 'actions'">Actions</button>
  <button class="view-tab" :class="{ active: recSubView === 'events' }" @click="recSubView = 'events'; if (selectedRecordingId && recordingEvents.length === 0) refreshRecordingEvents()">Events</button>
  <button class="view-tab" :class="{ active: recSubView === 'analysis' }" @click="recSubView = 'analysis'; if (selectedRecordingId && !recordingAnalysis) refreshRecordingAnalysis()">Analysis</button>
  <template x-if="recSubView === 'actions'">
    <span style="display:contents">
      <label>Card:</label>
      <input class="filter-input" type="text" placeholder="name or grpId..." x-model.debounce.150ms="recordingCardFilter">
      <label>Actor:</label>
      <input class="filter-input" type="text" placeholder="seat or player..." x-model.debounce.150ms="recordingActorFilter">
    </span>
  </template>
  <template x-if="recSubView === 'messages'">
    <span style="display:contents">
      <label>Filter:</label>
      <input class="filter-input" type="text" placeholder="type or text..." x-model.debounce.150ms="recMsgFilter">
    </span>
  </template>
  <button class="header-btn" @click="recSubView === 'actions' ? refreshRecordingActions() : refreshRecordingMessages()" x-show="selectedRecordingId">Reload</button>
  <button class="clear-btn" @click="recordingCardFilter=''; recordingActorFilter=''; recMsgFilter=''">Clear</button>
</div>

<!-- Main area -->
<div id="main">

  <!-- Messages timeline -->
  <div id="timeline" x-show="view === 'messages'">
    <template x-for="e in filteredEntries" :key="e.seq">
      <div class="entry" :class="'dir-' + e.dir + (hlIid !== null && e.instanceIds.includes(hlIid) ? ' highlight' : '')"
           @click="toggleExpand(e.seq, $event)">
        <div class="entry-header">
          <span class="dir-badge" x-text="e.dir === 'in' ? 'IN' : 'OUT'"></span>
          <span class="type-badge" :class="'type-' + e.type" x-text="e.type"></span>
          <span class="entry-summary" x-text="e.summary"></span>
          <span class="entry-meta" x-text="'seat=' + e.seatId + ' gs=' + e.gsId + ' #' + e.seq"></span>
          <button class="copy-btn" title="Copy JSON" @click.stop="copyJson(e.json, $el)">&copysr;</button>
        </div>
        <!-- IID chips -->
        <div class="entry-ids" x-show="e.instanceIds.length > 0">
          <template x-for="iid in e.instanceIds.slice(0, 20)" :key="iid">
            <span class="iid-chip" :class="{ highlight: hlIid === iid }"
                  x-text="iid" @click.stop="toggleHl(iid)"></span>
          </template>
          <span class="iid-chip" x-show="e.instanceIds.length > 20"
                x-text="'+' + (e.instanceIds.length - 20)"></span>
        </div>
        <!-- JSON tree (lazy-rendered via x-effect) -->
        <div class="json-wrap" x-show="expanded[e.seq]"
             x-effect="if (expanded[e.seq] && !$el.dataset.loaded) { $el.innerHTML = buildJsonHtml(e.json); $el.dataset.loaded = '1'; }"
             @click.stop="handleJsonClick($event)"></div>
      </div>
    </template>
  </div>

  <!-- States timeline -->
  <div id="timeline" x-show="view === 'states'" x-cloak style="overflow-y:auto; flex:1; padding:8px;">
    <template x-for="item in stateTimeline" :key="item.key">
      <div>
        <!-- Snapshot row -->
        <template x-if="item.kind === 'snapshot'">
          <div class="st-row st-snapshot" @click="toggleStateDiff(item.data.gsId)">
            <div class="st-header">
              <span class="st-gsid" x-text="'gs=' + item.data.gsId"></span>
              <span class="st-type" :class="'st-type-' + item.data.type" x-text="item.data.type"></span>
              <span class="st-phase" x-text="item.data.phase + '/' + item.data.step + ' T' + item.data.turn"></span>
              <span class="st-zones" x-text="zoneSummary(item.data)"></span>
              <span class="st-priority" :class="'st-priority-' + (item.data.priorityPlayer === 1 ? 'human' : 'ai')"
                    x-text="'priority=' + (item.data.priorityPlayer === 1 ? 'human' : 'ai')"></span>
              <template x-if="item.data.actions.length > 0">
                <span class="st-zones" x-text="actionSummary(item.data)"></span>
              </template>
              <template x-if="item.data.msgSeq > 0">
                <span class="entry-meta" x-text="'msg#' + item.data.msgSeq"></span>
              </template>
            </div>
            <!-- Inline diff -->
            <template x-if="expandedDiffs[item.data.gsId]">
              <div class="st-diff" x-html="renderDiff(expandedDiffs[item.data.gsId])"></div>
            </template>
          </div>
        </template>
        <!-- Priority event row -->
        <template x-if="item.kind === 'event'">
          <div class="st-row st-event" :class="'st-event-' + item.data.type">
            <div class="st-header">
              <span class="st-gsid" x-text="'gs=' + item.data.gsId"></span>
              <span class="st-event-badge" :class="'st-event-badge-' + item.data.type" x-text="item.data.type"></span>
              <span class="st-detail" x-text="item.data.detail"></span>
              <template x-if="item.data.stackDepth > 0">
                <span class="st-stack" x-text="'stack=' + item.data.stackDepth"></span>
              </template>
              <template x-if="item.data.priorityPlayer">
                <span class="st-priority" :class="'st-priority-' + item.data.priorityPlayer"
                      x-text="item.data.priorityPlayer"></span>
              </template>
              <span class="st-phase" x-text="item.data.phase + ' T' + item.data.turn"></span>
              <template x-if="item.data.msgSeq > 0">
                <span class="entry-meta" x-text="'msg#' + item.data.msgSeq"></span>
              </template>
            </div>
          </div>
        </template>
        <!-- Instance history (shown when an iid is selected) -->
        <template x-if="item.kind === 'snapshot' && stateHlIid !== null && hasInstance(item.data, stateHlIid)">
          <div class="st-history">
            <span style="color:var(--purple);font-weight:700" x-text="'iid=' + stateHlIid"></span>
            <span x-text="item.data.objects[stateHlIid]?.name || '?'"></span>
            <span :class="'zone-' + (item.data.objects[stateHlIid]?.zoneName || '')"
                  x-text="item.data.objects[stateHlIid]?.zoneName || '?'"></span>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- Recordings view -->
  <div id="recordings-wrap" x-show="view === 'recordings'" x-cloak>
    <div id="recordings-list" x-show="!recListCollapsed">
      <template x-for="r in recordings" :key="r.id">
        <div class="rec-row" :class="{ active: selectedRecordingId === r.id }" @click="loadRecording(r.id)">
          <div class="rec-title" x-text="r.name"></div>
          <div class="rec-meta" x-text="r.mode + ' • ' + r.fileCount + ' files'"></div>
          <div class="rec-meta" x-text="r.path"></div>
        </div>
      </template>
      <div class="rec-row" x-show="recordings.length === 0">
        <div class="rec-meta">No sessions found. Play a game to generate recordings.</div>
      </div>
    </div>

    <div id="recordings-list-toggle" x-show="recListCollapsed"
         @click="recListCollapsed = false"
         style="width:20px; flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center;
                border-right:1px solid var(--border); background:var(--bg2); color:var(--fg2); font-size:14px;"
         title="Show session list">&rsaquo;</div>
    <div id="recordings-main">
      <button class="header-btn" @click="recListCollapsed = !recListCollapsed"
              style="position:absolute; top:4px; left:4px; z-index:1; font-size:10px; padding:1px 5px;"
              x-text="recListCollapsed ? '\u25B6' : '\u25C0'" title="Toggle session list"></button>
      <!-- Analysis summary bar -->
      <div class="rec-summary" x-show="recordingAnalysis" style="border-left:3px solid var(--accent); margin-bottom:8px;">
        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:4px;">
          <span class="pill pill-count">analysis</span>
          <span class="pill" :class="recordingAnalysis?.termination === 'game_over' ? 'pill-active' : 'pill-phase'"
                x-text="recordingAnalysis?.termination || 'unknown'"></span>
          <span class="pill pill-turn" x-text="'T' + (recordingAnalysis?.turns || 0)"></span>
          <span class="pill" :class="recordingAnalysis?.winner === 'human' ? 'pill-active' : recordingAnalysis?.winner === 'ai' ? 'pill-phase' : 'pill-count'"
                x-text="'winner: ' + (recordingAnalysis?.winner || '?')"></span>
          <span class="pill pill-count" x-text="(recordingAnalysis?.durationMs / 1000).toFixed(1) + 's'"></span>
          <template x-if="recordingAnalysis?.invariantViolations?.length > 0">
            <span class="pill" style="background:var(--red);color:#fff"
                  x-text="recordingAnalysis.invariantViolations.length + ' violations'"></span>
          </template>
          <template x-if="recordingAnalysis?.invariantViolations?.length === 0">
            <span class="pill" style="background:var(--green);color:var(--bg)">clean</span>
          </template>
          <span class="pill" :class="recordingAnalysis?.gsidChain?.valid ? 'pill-active' : ''"
                :style="!recordingAnalysis?.gsidChain?.valid ? 'background:var(--red);color:#fff' : ''"
                x-text="'gsId chain: ' + (recordingAnalysis?.gsidChain?.valid ? 'valid' : 'BROKEN') + ' (' + (recordingAnalysis?.gsidChain?.length || 0) + ')'"></span>
        </div>
        <!-- Mechanics chips -->
        <div style="display:flex; gap:4px; flex-wrap:wrap; margin-bottom:4px;" x-show="recordingAnalysis?.mechanicsExercised?.length > 0">
          <span class="pill pill-count">mechanics</span>
          <template x-for="m in (recordingAnalysis?.mechanicsExercised || [])" :key="m.type">
            <span class="pill" style="background:var(--bg3);color:var(--green);font-size:10px"
                  x-text="m.type + ' x' + m.count"></span>
          </template>
        </div>
        <!-- Violations detail (collapsible) -->
        <template x-if="recordingAnalysis?.invariantViolations?.length > 0">
          <div style="margin-top:4px;">
            <div style="color:var(--red);font-weight:700;cursor:pointer" @click="showViolations = !showViolations"
                 x-text="(showViolations ? '\u25bc' : '\u25b6') + ' Violations (' + recordingAnalysis.invariantViolations.length + ')'"></div>
            <div x-show="showViolations" style="margin-top:4px;">
              <template x-for="(v, i) in recordingAnalysis.invariantViolations" :key="i">
                <div style="color:var(--red);font-size:10px;padding:2px 0;border-bottom:1px solid rgba(233,69,96,0.2)">
                  <span style="color:var(--fg2)">seq=<span x-text="v.seq"></span> gs=<span x-text="v.gsId"></span></span>
                  <span style="color:var(--orange);margin:0 4px" x-text="v.check"></span>
                  <span x-text="v.message"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
        <!-- Interesting moments -->
        <template x-if="recordingAnalysis?.interestingMoments?.length > 0">
          <div style="margin-top:4px;">
            <span class="pill pill-count">interesting</span>
            <template x-for="m in recordingAnalysis.interestingMoments" :key="m.seq">
              <div style="font-size:10px;color:var(--yellow);padding:1px 0">
                seq=<span x-text="m.seq"></span>: <span x-text="m.reason"></span>
              </div>
            </template>
          </div>
        </template>
      </div>

      <div class="rec-summary" x-show="recordingSummary">
        <div><span class="pill pill-count">mode</span> <span x-text="recordingSummary?.mode"></span></div>
        <div><span class="pill pill-count">messages</span> <span x-text="recordingSummary?.messageCount"></span>
             <span class="pill pill-count" style="margin-left:8px;">actions</span> <span x-text="recordingSummary?.actionCount"></span></div>
        <div><span class="pill pill-count">turns</span> <span x-text="(recordingSummary?.firstTurn ?? '-') + ' → ' + (recordingSummary?.lastTurn ?? '-')"></span></div>
        <div>
          <span class="pill pill-count">seats</span>
          <span x-text="(recordingSummary?.seats || []).map(s => 'seat ' + s.seatId + '=' + s.playerName).join(', ')"></span>
        </div>
        <div>
          <span class="pill pill-count">top cards</span>
          <span x-text="(recordingSummary?.topCards || []).slice(0, 6).map(c => c.card + ' x' + c.count).join(', ')"></span>
        </div>
        <div style="margin-top:6px; display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
          <span class="pill pill-count">compare</span>
          <select class="filter-input" style="width:260px;" x-model="recordingCompareTargetId">
            <option value="">select session...</option>
            <template x-for="r in recordings.filter(x => x.id !== selectedRecordingId)" :key="'cmp-' + r.id">
              <option :value="r.id" x-text="r.name + ' (' + r.mode + ')'"></option>
            </template>
          </select>
          <button class="header-btn" @click="runRecordingCompare()" :disabled="!recordingCompareTargetId">Run</button>
        </div>
        <div style="margin-top:4px;" x-show="recordingCompare">
          <span class="pill pill-count">left</span> <span x-text="recordingCompare?.leftActions"></span>
          <span class="pill pill-count" style="margin-left:8px;">right</span> <span x-text="recordingCompare?.rightActions"></span>
          <span class="pill pill-count" style="margin-left:8px;">first divergence</span>
          <span x-text="recordingCompare?.firstDivergence ? ('#' + recordingCompare.firstDivergence.index) : 'none'"></span>
        </div>
      </div>

      <!-- Hidden types bar -->
      <div x-show="Object.keys(recHiddenTypes).length > 0" style="margin-bottom:6px; display:flex; gap:4px; align-items:center; flex-wrap:wrap;">
        <span class="entry-meta">hidden:</span>
        <template x-for="t in Object.keys(recHiddenTypes)" :key="'h-' + t">
          <span class="pill pill-count" style="cursor:pointer; text-decoration:line-through; opacity:0.6"
                @click="const h = {...recHiddenTypes}; delete h[t]; recHiddenTypes = h" x-text="t"></span>
        </template>
        <span class="pill pill-count" style="cursor:pointer; color:var(--accent)"
              @click="recHiddenTypes = {}">show all</span>
      </div>

      <!-- Actions sub-view -->
      <template x-if="recSubView === 'actions'">
        <div>
          <table class="rec-actions" x-show="recordingActions.length > 0">
            <thead>
              <tr>
                <th>#</th>
                <th>Turn</th>
                <th>Phase</th>
                <th>Action</th>
                <th>Actor</th>
                <th>Card</th>
                <th>gs/msg</th>
                <th>File</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="a in filteredRecordingActions" :key="a.seq + '-' + a.file">
                <tr>
                  <td x-text="a.seq"></td>
                  <td x-text="'T' + (a.turn || 0)"></td>
                  <td style="color:var(--fg2)" x-text="a.phase || ''"></td>
                  <td class="rec-cat" x-text="a.category"></td>
                  <td class="rec-actor" x-text="a.actor || (a.actorSeat ? 'seat-' + a.actorSeat : '?')"></td>
                  <td class="rec-card" x-text="a.card || (a.grpId ? 'grp:' + a.grpId : '?')"></td>
                  <td x-text="a.gsId + '/' + a.msgId"></td>
                  <td x-text="a.file"></td>
                </tr>
              </template>
            </tbody>
          </table>
          <div class="rec-summary" x-show="selectedRecordingId && filteredRecordingActions.length === 0">
            <span>No actions match current filter.</span>
          </div>
        </div>
      </template>

      <!-- Messages sub-view (single session) -->
      <template x-if="recSubView === 'messages' && !compareMode">
        <div>
          <template x-for="m in filteredRecordingMessages" :key="m.index">
            <div class="entry" :class="'dir-in' + (recMsgExpanded[m.index] ? ' highlight' : '')"
                 @click="recMsgExpanded[m.index] = !recMsgExpanded[m.index]">
              <div class="entry-header">
                <span class="entry-meta" x-text="'#' + m.index" style="min-width:32px"></span>
                <span class="type-badge" :class="'type-' + m.greType" x-text="m.greType"
                          @click.stop="recHiddenTypes = {...recHiddenTypes, [m.greType]: true}"></span>
                <template x-if="m.gsmType">
                  <span class="pill pill-count" x-text="m.gsmType"></span>
                </template>
                <template x-if="m.updateType">
                  <span class="pill" :class="m.updateType === 'SendHiFi' ? 'pill-turn' : m.updateType === 'SendAndRecord' ? 'pill-active' : 'pill-phase'"
                        x-text="m.updateType"></span>
                </template>
                <template x-if="m.turnInfo">
                  <span class="pill pill-turn" x-text="'T' + m.turnInfo.turn + ' ' + m.turnInfo.phase + '/' + m.turnInfo.step"></span>
                </template>
                <span class="entry-meta" x-text="'gs=' + m.gsId + ' msg=' + m.msgId"></span>
                <template x-if="m.file">
                  <span class="entry-meta" x-text="m.file" style="opacity:0.4"></span>
                </template>
              </div>
              <!-- Annotation chips -->
              <div class="entry-ids" x-show="m.annotations.length > 0" style="margin-top:3px">
                <template x-for="ann in m.annotations" :key="ann.id">
                  <span class="iid-chip" style="background:var(--bg3);color:var(--orange)"
                        x-text="ann.types.join('+')"></span>
                </template>
              </div>
              <!-- Action summary line -->
              <div x-show="m.actions.length > 0" style="margin-top:2px">
                <span class="entry-meta" x-text="m.actions.map(a => a.type).join(', ')"></span>
              </div>
              <!-- Prompt/req badges -->
              <div class="entry-ids" style="margin-top:2px"
                   x-show="m.hasMulliganReq || m.hasActionsAvailableReq || m.hasDeclareAttackersReq || m.hasDeclareBlockersReq || m.hasSelectTargetsReq || m.hasIntermissionReq">
                <span class="iid-chip" x-show="m.hasMulliganReq" style="color:var(--yellow)">MulliganReq</span>
                <span class="iid-chip" x-show="m.hasActionsAvailableReq" style="color:var(--orange)">ActionsAvailableReq</span>
                <span class="iid-chip" x-show="m.hasDeclareAttackersReq" style="color:var(--red)">DeclareAttackersReq</span>
                <span class="iid-chip" x-show="m.hasDeclareBlockersReq" style="color:var(--red)">DeclareBlockersReq</span>
                <span class="iid-chip" x-show="m.hasSelectTargetsReq" style="color:var(--purple)">SelectTargetsReq</span>
                <span class="iid-chip" x-show="m.hasIntermissionReq" style="color:var(--red)">IntermissionReq</span>
              </div>
              <!-- Expanded detail -->
              <div class="json-wrap" x-show="recMsgExpanded[m.index]"
                   x-effect="if (recMsgExpanded[m.index] && !$el.dataset.loaded) { $el.innerHTML = buildJsonHtml(JSON.stringify(m)); $el.dataset.loaded = '1'; }"
                   @click.stop="handleJsonClick($event)"></div>
            </div>
          </template>
          <div class="rec-summary" x-show="selectedRecordingId && filteredRecordingMessages.length === 0">
            <span>No messages found.</span>
          </div>
        </div>
      </template>

      <!-- Events sub-view (paired JSONL timeline) -->
      <template x-if="recSubView === 'events'">
        <div>
          <template x-for="(ev, i) in recordingEvents" :key="i">
            <div class="entry" :class="'dir-' + (ev.stream === 'client' ? 'in' : 'out')"
                 style="padding:4px 10px; margin-bottom:1px;">
              <div class="entry-header">
                <span class="entry-meta" x-text="'#' + ev.seq" style="min-width:32px"></span>
                <span class="pill" :class="{
                  'pill-active': ev.stream === 'proto',
                  'pill-turn': ev.stream === 'forge',
                  'pill-phase': ev.stream === 'client',
                  'pill-count': ev.stream === 'golden'
                }" x-text="ev.stream" style="font-size:9px"></span>
                <template x-if="ev.stream === 'proto'">
                  <span style="display:contents">
                    <span class="type-badge" :class="'type-' + ev.greType" x-text="ev.greType"></span>
                    <template x-if="ev.updateType">
                      <span class="pill" :class="ev.updateType === 'SendHiFi' ? 'pill-turn' : 'pill-active'" x-text="ev.updateType"></span>
                    </template>
                    <span class="entry-meta" x-text="'gs=' + ev.gsId + ' msg=' + ev.msgId"></span>
                    <template x-if="ev.categories?.length > 0">
                      <span class="rec-cat" x-text="ev.categories.join(', ')"></span>
                    </template>
                    <span class="entry-meta" x-text="ev.objectCount ? ev.objectCount + ' objs' : ''"></span>
                  </span>
                </template>
                <template x-if="ev.stream === 'forge'">
                  <span style="display:contents">
                    <template x-for="fe in (ev.events || [])" :key="fe.type">
                      <span class="pill" style="background:var(--bg3);color:var(--green);font-size:10px" x-text="fe.type + (fe.seat ? ' s' + fe.seat : '')"></span>
                    </template>
                  </span>
                </template>
                <template x-if="ev.stream === 'client'">
                  <span style="display:contents">
                    <span class="type-badge type-PerformActionResp" x-text="ev.actionType"></span>
                    <span class="entry-meta" x-text="'iid=' + ev.instanceId + ' grp=' + ev.grpId + ' gs=' + ev.gsId"></span>
                  </span>
                </template>
                <template x-if="ev.stream === 'golden'">
                  <span style="display:contents">
                    <span class="type-badge" x-text="ev.greType"></span>
                    <span class="entry-meta" x-text="'gs=' + ev.gsId + ' msg=' + ev.msgId"></span>
                  </span>
                </template>
                <span class="entry-meta" style="opacity:0.4" x-text="ev.ts ? ev.ts.substring(11, 23) : ''"></span>
              </div>
            </div>
          </template>
          <div class="rec-summary" x-show="selectedRecordingId && recordingEvents.length === 0">
            <span>No events.jsonl found for this session.</span>
          </div>
        </div>
      </template>

      <!-- Analysis sub-view (full analysis detail) -->
      <template x-if="recSubView === 'analysis'">
        <div>
          <div class="rec-summary" x-show="!recordingAnalysis">
            <span>No analysis available. Play a game to generate analysis.json.</span>
          </div>
          <div x-show="recordingAnalysis">
            <div class="json-wrap" style="max-height:none"
                 x-effect="if (recordingAnalysis && $el) { $el.innerHTML = buildJsonHtml(JSON.stringify(recordingAnalysis)); }"
                 @click.stop="handleJsonClick($event)"></div>
          </div>
        </div>
      </template>

      <!-- Messages compare view (side-by-side) -->
      <template x-if="recSubView === 'messages' && compareMode">
        <div>
          <div style="display:flex; gap:6px; margin-bottom:6px; align-items:center;">
            <span class="pill pill-active" x-text="compareLeftName"></span>
            <span style="color:var(--fg2)">vs</span>
            <span class="pill pill-turn" x-text="compareRightName"></span>
            <span class="entry-meta" style="margin-left:8px"
                  x-text="'(' + filteredCompareLeftMessages.length + ' / ' + filteredCompareRightMessages.length + ' msgs)'"></span>
            <button class="header-btn" @click="compareMode = false" style="margin-left:auto">Close</button>
          </div>
          <div class="compare-columns">
            <!-- Left column -->
            <div class="compare-col compare-col-left">
              <template x-for="m in filteredCompareLeftMessages" :key="'L' + m.index">
                <div class="entry dir-in" :class="recMsgExpanded['L'+m.index] ? 'highlight' : ''"
                     @click="recMsgExpanded['L'+m.index] = !recMsgExpanded['L'+m.index]">
                  <div class="entry-header">
                    <span class="entry-meta" x-text="'#' + m.index" style="min-width:32px"></span>
                    <span class="type-badge" :class="'type-' + m.greType" x-text="m.greType"
                          @click.stop="recHiddenTypes = {...recHiddenTypes, [m.greType]: true}"></span>
                    <template x-if="m.gsmType">
                      <span class="pill pill-count" x-text="m.gsmType"></span>
                    </template>
                    <template x-if="m.updateType">
                      <span class="pill" :class="m.updateType === 'SendHiFi' ? 'pill-turn' : m.updateType === 'SendAndRecord' ? 'pill-active' : 'pill-phase'"
                            x-text="m.updateType"></span>
                    </template>
                    <template x-if="m.turnInfo">
                      <span class="pill pill-turn" x-text="'T' + m.turnInfo.turn + ' ' + m.turnInfo.phase + '/' + m.turnInfo.step"></span>
                    </template>
                    <span class="entry-meta" x-text="'gs=' + m.gsId + ' msg=' + m.msgId"></span>
                  </div>
                  <div class="entry-ids" x-show="m.annotations.length > 0" style="margin-top:3px">
                    <template x-for="ann in m.annotations" :key="ann.id">
                      <span class="iid-chip" style="background:var(--bg3);color:var(--orange)"
                            x-text="ann.types.join('+')"></span>
                    </template>
                  </div>
                  <div x-show="m.actions.length > 0" style="margin-top:2px">
                    <span class="entry-meta" x-text="m.actions.map(a => a.type).join(', ')"></span>
                  </div>
                  <div class="entry-ids" style="margin-top:2px"
                       x-show="m.hasMulliganReq || m.hasActionsAvailableReq || m.hasDeclareAttackersReq || m.hasDeclareBlockersReq || m.hasSelectTargetsReq || m.hasIntermissionReq">
                    <span class="iid-chip" x-show="m.hasMulliganReq" style="color:var(--yellow)">MulliganReq</span>
                    <span class="iid-chip" x-show="m.hasActionsAvailableReq" style="color:var(--orange)">ActionsAvailableReq</span>
                    <span class="iid-chip" x-show="m.hasDeclareAttackersReq" style="color:var(--red)">DeclareAttackersReq</span>
                    <span class="iid-chip" x-show="m.hasDeclareBlockersReq" style="color:var(--red)">DeclareBlockersReq</span>
                    <span class="iid-chip" x-show="m.hasSelectTargetsReq" style="color:var(--purple)">SelectTargetsReq</span>
                    <span class="iid-chip" x-show="m.hasIntermissionReq" style="color:var(--red)">IntermissionReq</span>
                  </div>
                  <div class="json-wrap" x-show="recMsgExpanded['L'+m.index]"
                       x-effect="if (recMsgExpanded['L'+m.index] && !$el.dataset.loaded) { $el.innerHTML = buildJsonHtml(JSON.stringify(m)); $el.dataset.loaded = '1'; }"
                       @click.stop="handleJsonClick($event)"></div>
                </div>
              </template>
            </div>
            <!-- Right column -->
            <div class="compare-col compare-col-right">
              <template x-for="m in filteredCompareRightMessages" :key="'R' + m.index">
                <div class="entry dir-in" :class="recMsgExpanded['R'+m.index] ? 'highlight' : ''"
                     @click="recMsgExpanded['R'+m.index] = !recMsgExpanded['R'+m.index]">
                  <div class="entry-header">
                    <span class="entry-meta" x-text="'#' + m.index" style="min-width:32px"></span>
                    <span class="type-badge" :class="'type-' + m.greType" x-text="m.greType"
                          @click.stop="recHiddenTypes = {...recHiddenTypes, [m.greType]: true}"></span>
                    <template x-if="m.gsmType">
                      <span class="pill pill-count" x-text="m.gsmType"></span>
                    </template>
                    <template x-if="m.updateType">
                      <span class="pill" :class="m.updateType === 'SendHiFi' ? 'pill-turn' : m.updateType === 'SendAndRecord' ? 'pill-active' : 'pill-phase'"
                            x-text="m.updateType"></span>
                    </template>
                    <template x-if="m.turnInfo">
                      <span class="pill pill-turn" x-text="'T' + m.turnInfo.turn + ' ' + m.turnInfo.phase + '/' + m.turnInfo.step"></span>
                    </template>
                    <span class="entry-meta" x-text="'gs=' + m.gsId + ' msg=' + m.msgId"></span>
                  </div>
                  <div class="entry-ids" x-show="m.annotations.length > 0" style="margin-top:3px">
                    <template x-for="ann in m.annotations" :key="ann.id">
                      <span class="iid-chip" style="background:var(--bg3);color:var(--orange)"
                            x-text="ann.types.join('+')"></span>
                    </template>
                  </div>
                  <div x-show="m.actions.length > 0" style="margin-top:2px">
                    <span class="entry-meta" x-text="m.actions.map(a => a.type).join(', ')"></span>
                  </div>
                  <div class="entry-ids" style="margin-top:2px"
                       x-show="m.hasMulliganReq || m.hasActionsAvailableReq || m.hasDeclareAttackersReq || m.hasDeclareBlockersReq || m.hasSelectTargetsReq || m.hasIntermissionReq">
                    <span class="iid-chip" x-show="m.hasMulliganReq" style="color:var(--yellow)">MulliganReq</span>
                    <span class="iid-chip" x-show="m.hasActionsAvailableReq" style="color:var(--orange)">ActionsAvailableReq</span>
                    <span class="iid-chip" x-show="m.hasDeclareAttackersReq" style="color:var(--red)">DeclareAttackersReq</span>
                    <span class="iid-chip" x-show="m.hasDeclareBlockersReq" style="color:var(--red)">DeclareBlockersReq</span>
                    <span class="iid-chip" x-show="m.hasSelectTargetsReq" style="color:var(--purple)">SelectTargetsReq</span>
                    <span class="iid-chip" x-show="m.hasIntermissionReq" style="color:var(--red)">IntermissionReq</span>
                  </div>
                  <div class="json-wrap" x-show="recMsgExpanded['R'+m.index]"
                       x-effect="if (recMsgExpanded['R'+m.index] && !$el.dataset.loaded) { $el.innerHTML = buildJsonHtml(JSON.stringify(m)); $el.dataset.loaded = '1'; }"
                       @click.stop="handleJsonClick($event)"></div>
                </div>
              </template>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Logs panel -->
  <div id="log-panel" x-show="view === 'logs'" x-cloak>
    <template x-for="l in filteredLogs" :key="l.seq">
      <div class="log-row">
        <span class="log-ts" x-text="fmtTs(l.ts)"></span>
        <span class="log-level" :class="'log-level-' + l.level" x-text="l.level"></span>
        <span class="log-thread" x-text="'[' + l.thread + ']'"></span>
        <span class="log-logger" x-text="l.logger"></span>
        <span class="log-msg" :class="'log-msg-' + l.level" x-text="l.message"></span>
      </div>
    </template>
  </div>

  <!-- ID map sidebar -->
  <div id="id-panel" x-show="showIdPanel" x-cloak>
    <h2>Instance ID Map</h2>
    <table id="id-table">
      <thead><tr><th>IID</th><th>Card</th><th>Zone</th><th>GrpID</th></tr></thead>
      <tbody>
        <template x-for="row in idMap" :key="row.instanceId">
          <tr :class="{ highlight: hlIid === row.instanceId }" @click="toggleHl(row.instanceId)">
            <td x-text="row.instanceId"></td>
            <td x-text="row.cardName"></td>
            <td :class="'zone-' + row.zone" x-text="row.zone"></td>
            <td x-text="row.grpId"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>

<script>
function debugApp() {
  return {
    // Data
    entries: [],
    logEntries: [],
    state: { phase: null, turn: 0, activePlayer: null, entryCount: 0 },
    idMap: [],

    // Recordings tab data
    recordings: [],
    selectedRecordingId: null,
    recordingSummary: null,
    recordingAnalysis: null,
    recordingActions: [],
    recordingMessages: [],
    recordingEvents: [],
    recordingCompareTargetId: null,
    recordingCompare: null,
    compareMode: false,
    compareLeftMessages: [],
    compareRightMessages: [],
    compareLeftName: '',
    compareRightName: '',
    recSubView: 'messages',
    recMsgFilter: '',
    recMsgExpanded: {},
    recHiddenTypes: JSON.parse(localStorage.getItem('recHiddenTypes') || '{}'),
    recListCollapsed: false,


    // States tab data
    gameStates: [],
    priorityEvents: [],
    expandedDiffs: {},
    stateHlIid: null,

    // UI state
    paused: false,
    view: 'messages',
    showIdPanel: false,
    showIn: true,
    showOut: true,
    hlIid: null,
    msgFilter: '',
    logFilter: '',
    recordingCardFilter: '',
    recordingActorFilter: '',
    logLevels: { DEBUG: true, INFO: true, WARN: true, ERROR: true },
    showViolations: false,
    expanded: {},

    // Internal
    _lastSeq: 0,
    _lastLogSeq: 0,
    _lastEventSeq: 0,

    // Computed
    get filteredEntries() {
      const f = this.msgFilter.toLowerCase();
      const out = [];
      const seen = new Set();
      for (let i = this.entries.length - 1; i >= 0; i--) {
        const e = this.entries[i];
        if (seen.has(e.seq)) continue;
        seen.add(e.seq);
        if (e.dir === 'in' && !this.showIn) continue;
        if (e.dir === 'out' && !this.showOut) continue;
        if (f && !e.type.toLowerCase().includes(f) && !e.summary.toLowerCase().includes(f)) continue;
        out.push(e);
      }
      return out;
    },

    _filterRecMessages(msgs) {
      const hidden = this.recHiddenTypes;
      const f = this.recMsgFilter.toLowerCase();
      return msgs.filter(m => {
        if (hidden[m.greType]) return false;
        if (!f) return true;
        if (m.greType.toLowerCase().includes(f)) return true;
        if (m.gsmType && m.gsmType.toLowerCase().includes(f)) return true;
        if (m.updateType && m.updateType.toLowerCase().includes(f)) return true;
        if (m.annotations.some(a => a.types.some(t => t.toLowerCase().includes(f)))) return true;
        if (m.actions.some(a => a.type.toLowerCase().includes(f))) return true;
        return false;
      });
    },

    get filteredRecordingMessages() {
      return this._filterRecMessages(this.recordingMessages);
    },

    get filteredCompareLeftMessages() {
      return this._filterRecMessages(this.compareLeftMessages);
    },

    get filteredCompareRightMessages() {
      return this._filterRecMessages(this.compareRightMessages);
    },

    get filteredRecordingActions() {
      const card = this.recordingCardFilter.trim().toLowerCase();
      const actor = this.recordingActorFilter.trim().toLowerCase();
      return this.recordingActions.filter(a => {
        if (card) {
          const cardText = (a.card || '').toLowerCase();
          const grpText = a.grpId ? String(a.grpId) : '';
          if (!cardText.includes(card) && !grpText.includes(card)) return false;
        }
        if (actor) {
          const actorText = (a.actor || '').toLowerCase();
          const seatText = a.actorSeat ? String(a.actorSeat) : '';
          if (!actorText.includes(actor) && seatText !== actor) return false;
        }
        return true;
      });
    },

    get filteredLogs() {
      const f = this.logFilter.toLowerCase();
      const out = [];
      const seen = new Set();
      for (let i = this.logEntries.length - 1; i >= 0; i--) {
        const l = this.logEntries[i];
        if (seen.has(l.seq)) continue;
        seen.add(l.seq);
        if (!this.logLevels[l.level]) continue;
        if (f && !l.logger.toLowerCase().includes(f) && !l.message.toLowerCase().includes(f)) continue;
        out.push(l);
      }
      return out;
    },

    // Unified state timeline: snapshots + priority events, sorted by ts
    get stateTimeline() {
      const items = [];
      for (const s of this.gameStates) {
        items.push({ kind: 'snapshot', ts: s.ts, key: 's' + s.gsId, data: s });
      }
      for (const e of this.priorityEvents) {
        items.push({ kind: 'event', ts: e.ts, key: 'e' + e.seq, data: e });
      }
      items.sort((a, b) => a.ts - b.ts);
      return items;
    },

    // SSE state
    _sseConnected: false,

    // Lifecycle
    init() {
      this.$watch('recHiddenTypes', (v) => localStorage.setItem('recHiddenTypes', JSON.stringify(v)));
      this.connectSSE();
      this.poll();
      this.fetchRecordings();
    },

    connectSSE() {
      this._sseRetryDelay = 1000;
      this._startSSE();
    },

    _startSSE() {
      try {
        const es = new EventSource('/api/events');
        es.addEventListener('message', (ev) => {
          if (this.paused) return;
          const e = JSON.parse(ev.data);
          if (e.seq <= this._lastSeq) return;
          this.entries.push(e);
          this._lastSeq = e.seq;
          if (this.entries.length > 1000) this.entries.splice(0, this.entries.length - 500);
        });
        es.addEventListener('log', (ev) => {
          if (this.paused) return;
          const l = JSON.parse(ev.data);
          if (l.seq <= this._lastLogSeq) return;
          this.logEntries.push(l);
          this._lastLogSeq = l.seq;
          if (this.logEntries.length > 5000) this.logEntries.splice(0, this.logEntries.length - 2000);
        });
        es.addEventListener('priority', (ev) => {
          if (this.paused) return;
          const e = JSON.parse(ev.data);
          if (e.seq <= this._lastEventSeq) return;
          this.priorityEvents.push(e);
          this._lastEventSeq = e.seq;
          if (this.priorityEvents.length > 1000) this.priorityEvents.splice(0, this.priorityEvents.length - 500);
        });
        es.addEventListener('state', (ev) => {
          if (this.paused) return;
          const s = JSON.parse(ev.data);
          const idx = this.gameStates.findIndex(gs => gs.gsId === s.gsId);
          if (idx >= 0) this.gameStates[idx] = s;
          else this.gameStates.push(s);
        });
        es.onopen = () => {
          this._sseConnected = true;
          this._sseRetryDelay = 1000;
        };
        es.onerror = () => {
          this._sseConnected = false;
          es.close();
          const delay = Math.min(this._sseRetryDelay, 10000);
          this._sseRetryDelay = delay * 1.5;
          setTimeout(() => this._startSSE(), delay);
        };
        this._sse = es;
      } catch (_) {
        this._sseConnected = false;
        setTimeout(() => this._startSSE(), this._sseRetryDelay);
      }
    },

    // Polling — SSE handles incremental data; poll only for state header + id-map + game-states timeline
    async poll() {
      if (!this.paused) {
        try {
          const fetches = [fetch('/api/state')];
          // When SSE is not connected, fall back to REST polling for incremental data
          if (!this._sseConnected) {
            fetches.push(fetch('/api/messages?since=' + this._lastSeq));
            fetches.push(fetch('/api/logs?since=' + this._lastLogSeq + '&level=DEBUG'));
          }
          // Game states timeline (full reload) — only when States tab is active
          if (this.view === 'states') {
            fetches.push(fetch('/api/game-states'));
            if (!this._sseConnected) {
              fetches.push(fetch('/api/priority-events?since=' + this._lastEventSeq));
            }
          }
          const responses = await Promise.all(fetches);
          let ri = 0;
          this.state = await responses[ri++].json();

          if (!this._sseConnected) {
            // Messages (envelope)
            const msgsEnv = await responses[ri++].json();
            const msgs = msgsEnv.data || msgsEnv;
            if (msgs.length > 0) {
              for (const e of msgs) {
                if (e.seq <= this._lastSeq) continue;
                this.entries.push(e);
                this._lastSeq = e.seq;
              }
              if (msgsEnv.cursor) this._lastSeq = msgsEnv.cursor;
              if (this.entries.length > 1000) this.entries.splice(0, this.entries.length - 500);
            }
            // Logs (envelope)
            const logsEnv = await responses[ri++].json();
            const logs = logsEnv.data || logsEnv;
            if (logs.length > 0) {
              for (const l of logs) {
                if (l.seq <= this._lastLogSeq) continue;
                this.logEntries.push(l);
                this._lastLogSeq = l.seq;
              }
              if (logsEnv.cursor) this._lastLogSeq = logsEnv.cursor;
              if (this.logEntries.length > 5000) this.logEntries.splice(0, this.logEntries.length - 2000);
            }
          }

          // Game states timeline (envelope)
          if (this.view === 'states') {
            const gsEnv = await responses[ri++].json();
            this.gameStates = gsEnv.data || gsEnv;
            if (!this._sseConnected) {
              const evEnv = await responses[ri++].json();
              const newEvents = evEnv.data || evEnv;
              if (newEvents.length > 0) {
                for (const ev of newEvents) {
                  if (ev.seq <= this._lastEventSeq) continue;
                  this.priorityEvents.push(ev);
                  this._lastEventSeq = ev.seq;
                }
                if (evEnv.cursor) this._lastEventSeq = evEnv.cursor;
                if (this.priorityEvents.length > 1000) this.priorityEvents.splice(0, this.priorityEvents.length - 500);
              }
            }
          }

          if (this.showIdPanel) this.fetchIdMap();
        } catch (_) { /* server not up */ }
      }
      setTimeout(() => this.poll(), this._sseConnected ? 2000 : 500);
    },

    async fetchRecordings() {
      try {
        const env = await (await fetch('/api/recordings')).json();
        this.recordings = env.data || env;
        if (!this.selectedRecordingId && this.recordings.length > 0) {
          this.loadRecording(this.recordings[0].id);
        }
      } catch (_) {}
    },

    async loadRecording(id) {
      this.selectedRecordingId = id;
      this.recordingSummary = null;
      this.recordingAnalysis = null;
      this.recordingActions = [];
      this.recordingMessages = [];
      this.recordingEvents = [];
      this.recMsgExpanded = {};
      this.recordingCompare = null;
      this.recordingCompareTargetId = null;
      this.compareMode = false;
      const fetches = [this.refreshRecordingSummary(), this.refreshRecordingAnalysis()];
      if (this.recSubView === 'messages') fetches.push(this.refreshRecordingMessages());
      else if (this.recSubView === 'events') fetches.push(this.refreshRecordingEvents());
      else fetches.push(this.refreshRecordingActions());
      await Promise.all(fetches);
    },

    async refreshRecordingSummary() {
      if (!this.selectedRecordingId) return;
      try {
        const r = await fetch('/api/recording-summary?id=' + encodeURIComponent(this.selectedRecordingId));
        if (!r.ok) return;
        this.recordingSummary = await r.json();
      } catch (_) {}
    },

    async refreshRecordingActions() {
      if (!this.selectedRecordingId) return;
      try {
        const card = this.recordingCardFilter ? '&card=' + encodeURIComponent(this.recordingCardFilter) : '';
        const actor = this.recordingActorFilter ? '&actor=' + encodeURIComponent(this.recordingActorFilter) : '';
        const r = await fetch('/api/recording-actions?id=' + encodeURIComponent(this.selectedRecordingId) + card + actor + '&limit=2000');
        if (!r.ok) return;
        const env = await r.json();
        this.recordingActions = env.data || env;
      } catch (_) {}
    },

    async refreshRecordingMessages() {
      if (!this.selectedRecordingId) return;
      try {
        const r = await fetch('/api/recording-messages?id=' + encodeURIComponent(this.selectedRecordingId));
        if (!r.ok) return;
        const env = await r.json();
        this.recordingMessages = env.data || env;
        this.recMsgExpanded = {};
      } catch (_) {}
    },

    async refreshRecordingAnalysis() {
      if (!this.selectedRecordingId) return;
      try {
        const r = await fetch('/api/recording-analysis?id=' + encodeURIComponent(this.selectedRecordingId));
        if (!r.ok) { this.recordingAnalysis = null; return; }
        this.recordingAnalysis = await r.json();
      } catch (_) { this.recordingAnalysis = null; }
    },

    async refreshRecordingEvents() {
      if (!this.selectedRecordingId) return;
      try {
        const r = await fetch('/api/recording-events?id=' + encodeURIComponent(this.selectedRecordingId));
        if (!r.ok) return;
        const env = await r.json();
        this.recordingEvents = (env.data || []).map(ev => ({ stream: 'proto', ...ev }));
      } catch (_) {}
    },


    async runRecordingCompare() {
      if (!this.selectedRecordingId || !this.recordingCompareTargetId) return;
      try {
        const [leftR, rightR, cmpR] = await Promise.all([
          fetch('/api/recording-messages?id=' + encodeURIComponent(this.selectedRecordingId)),
          fetch('/api/recording-messages?id=' + encodeURIComponent(this.recordingCompareTargetId)),
          fetch('/api/recording-compare?left=' + encodeURIComponent(this.selectedRecordingId) + '&right=' + encodeURIComponent(this.recordingCompareTargetId)),
        ]);
        if (leftR.ok && rightR.ok) {
          const leftEnv = await leftR.json();
          const rightEnv = await rightR.json();
          this.compareLeftMessages = leftEnv.data || leftEnv;
          this.compareRightMessages = rightEnv.data || rightEnv;
          this.compareLeftName = this.recordings.find(r => r.id === this.selectedRecordingId)?.name || '?';
          this.compareRightName = this.recordings.find(r => r.id === this.recordingCompareTargetId)?.name || '?';
          this.compareMode = true;
        }
        if (cmpR.ok) this.recordingCompare = await cmpR.json();
      } catch (_) {}
    },

    // Actions
    toggleExpand(seq, ev) {
      // Don't toggle when clicking copy/chip/json-wrap (those stop propagation)
      this.expanded[seq] = !this.expanded[seq];
    },

    toggleHl(iid) {
      this.hlIid = this.hlIid === iid ? null : iid;
    },

    copyJson(json, btn) {
      let text;
      try { text = JSON.stringify(JSON.parse(json), null, 2); } catch { text = json; }
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '\u2713';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '\u2398'; btn.classList.remove('copied'); }, 1200);
      }).catch(() => {});
    },

    // --- States tab helpers ---

    zoneSummary(s) {
      const counts = {};
      for (const z of Object.values(s.zones)) {
        const n = z.objectInstanceIds.length;
        if (n > 0) counts[z.type] = (counts[z.type] || 0) + n;
      }
      return Object.entries(counts).map(([t, n]) => t + '=' + n).join(' ');
    },

    actionSummary(s) {
      const counts = {};
      for (const a of s.actions) counts[a.actionType] = (counts[a.actionType] || 0) + 1;
      return Object.entries(counts).map(([t, n]) => t + '=' + n).join(' ');
    },

    hasInstance(s, iid) {
      return s.objects && s.objects[iid] !== undefined;
    },

    async toggleStateDiff(gsId) {
      if (this.expandedDiffs[gsId]) {
        delete this.expandedDiffs[gsId];
        return;
      }
      // Find previous gsId
      const idx = this.gameStates.findIndex(s => s.gsId === gsId);
      if (idx <= 0) {
        this.expandedDiffs[gsId] = { empty: true };
        return;
      }
      const prevGsId = this.gameStates[idx - 1].gsId;
      try {
        const resp = await fetch('/api/state-diff?from=' + prevGsId + '&to=' + gsId);
        const diff = await resp.json();
        this.expandedDiffs[gsId] = diff;
      } catch (_) {
        this.expandedDiffs[gsId] = { empty: true };
      }
    },

    renderDiff(diff) {
      if (!diff || diff.empty) return '<span class="st-diff-empty">NO CHANGES</span>';
      let h = '';
      if (diff.phaseChange) h += '<div class="st-diff-phase">' + esc(diff.phaseChange) + '</div>';
      if (diff.turnChange) h += '<div class="st-diff-phase">turn: ' + esc(diff.turnChange) + '</div>';
      for (const p of (diff.playerDeltas || [])) {
        h += '<div class="st-diff-life">seat ' + p.seatId + ' life: ' + esc(p.lifeChange || '') + '</div>';
      }
      for (const z of (diff.zoneDeltas || [])) {
        for (const r of z.added) {
          h += '<div class="st-diff-added">+ ' + esc(z.type) + ': ' + (r.name || 'iid=' + r.instanceId) + ' (iid=' + r.instanceId + ')</div>';
        }
        for (const r of z.removed) {
          h += '<div class="st-diff-removed">- ' + esc(z.type) + ': ' + (r.name || 'iid=' + r.instanceId) + ' (iid=' + r.instanceId + ')</div>';
        }
      }
      for (const o of (diff.objectDeltas || [])) {
        if (o.changeType === 'added') {
          h += '<div class="st-diff-added">+ obj ' + (o.name || 'iid=' + o.instanceId) + '</div>';
        } else if (o.changeType === 'removed') {
          h += '<div class="st-diff-removed">- obj ' + (o.name || 'iid=' + o.instanceId) + '</div>';
        } else if (o.changeType === 'modified') {
          const changes = Object.entries(o.changes).map(([k, v]) => k + ': ' + v).join(', ');
          h += '<div class="st-diff-modified">' + esc(o.name || 'iid=' + o.instanceId) + ': ' + esc(changes) + '</div>';
        }
      }
      if (diff.actionsSummary) h += '<div style="color:var(--fg2)">actions: ' + esc(diff.actionsSummary) + '</div>';
      return h || '<span class="st-diff-empty">NO CHANGES</span>';
    },

    async fetchIdMap() {
      try {
        const env = await (await fetch('/api/id-map')).json();
        this.idMap = env.data || env;
      } catch (_) {}
    },

    fmtTs(ts) {
      const d = new Date(ts);
      return d.toTimeString().slice(0, 8) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    },

    // JSON tree: event delegation for collapse/expand and iid highlight
    handleJsonClick(ev) {
      const t = ev.target;
      if (t.classList.contains('json-toggle')) {
        const node = t.closest('.json-node');
        if (node) {
          node.classList.toggle('json-collapsed');
          node.classList.toggle('json-expanded');
        }
      } else if (t.classList.contains('json-iid')) {
        const iid = parseInt(t.textContent);
        if (!isNaN(iid)) this.toggleHl(iid);
      }
    },
  };
}

// ── JSON tree HTML builder ──────────────────────────────────────────────────
// Returns an HTML string. Interactivity (collapse/expand, iid highlight)
// is handled via event delegation in handleJsonClick above.

function buildJsonHtml(jsonStr) {
  try {
    return jsonNode(JSON.parse(jsonStr), 0);
  } catch {
    return esc(jsonStr);
  }
}

function jsonNode(val, depth) {
  if (val === null) return '<span class="json-null">null</span>';
  if (typeof val === 'boolean') return '<span class="json-bool">' + val + '</span>';
  if (typeof val === 'number') {
    const isIid = val >= 100 && val < 200000 && Number.isInteger(val);
    return '<span class="json-num' + (isIid ? ' json-iid' : '') + '">' + val + '</span>';
  }
  if (typeof val === 'string') return '<span class="json-str">"' + esc(val) + '"</span>';

  if (Array.isArray(val)) {
    if (val.length === 0) return '<span class="json-bracket">[]</span>';
    const cls = (depth > 2 || val.length > 10) ? 'json-collapsed' : 'json-expanded';
    let h = '<span class="json-node ' + cls + '">';
    h += '<span class="json-toggle-row"><span class="json-toggle json-bracket">[' + val.length + ']</span></span>';
    h += '<div class="json-children" style="padding-left:16px">';
    for (let i = 0; i < val.length; i++) {
      h += '<div>' + jsonNode(val[i], depth + 1);
      if (i < val.length - 1) h += '<span class="json-bracket">,</span>';
      h += '</div>';
    }
    return h + '</div></span>';
  }

  if (typeof val === 'object') {
    const keys = Object.keys(val);
    if (keys.length === 0) return '<span class="json-bracket">{}</span>';
    const cls = depth > 3 ? 'json-collapsed' : 'json-expanded';
    let h = '<span class="json-node ' + cls + '">';
    h += '<span class="json-toggle-row"><span class="json-toggle json-bracket">{' + keys.length + '}</span></span>';
    h += '<div class="json-children" style="padding-left:16px">';
    for (let i = 0; i < keys.length; i++) {
      h += '<div><span class="json-key">' + esc(keys[i]) + '</span>: ';
      h += jsonNode(val[keys[i]], depth + 1);
      if (i < keys.length - 1) h += '<span class="json-bracket">,</span>';
      h += '</div>';
    }
    return h + '</div></span>';
  }

  return esc(String(val));
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
