name: Setup Maven
description: Download Maven and add to PATH (for self-hosted runners)
inputs:
  version:
    description: Maven version to install
    default: '3.9.9'
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        curl -sL "https://archive.apache.org/dist/maven/maven-3/${{ inputs.version }}/binaries/apache-maven-${{ inputs.version }}-bin.tar.gz" | tar xz -C /opt
        echo "/opt/apache-maven-${{ inputs.version }}/bin" >> "$GITHUB_PATH"
