name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '17'

jobs:
  # --- Gate: reuse CI checks on existing Linux runner ---
  gate:
    name: Gate
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: leyline,forge

      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: '' # disable — self-hosted runners use persistent Docker volumes

      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - uses: extractions/setup-just@v2

      - run: just install-forge
      - run: just fmt-check
      - run: just build
      - run: ./gradlew detekt
      - run: just test-gate

  # --- Build .dmg on macOS (Apple Silicon) ---
  build-macos:
    name: Build macOS (arm64)
    needs: gate
    runs-on: macos-14
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: leyline,forge

      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0  # full history for changelog

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - uses: actions/cache@v4
        with:
          path: forge/.m2-local/forge/
          key: upstream-m2-${{ hashFiles('forge/forge-core/src/**', 'forge/forge-game/src/**', 'forge/forge-ai/src/**', 'forge/forge-gui/src/**', 'forge/pom.xml') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            launcher/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('launcher/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: extractions/setup-just@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install forge JARs
        run: just install-forge

      - name: Install launcher deps
        run: cd launcher && bun install

      - name: Version check
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAURI_VERSION=$(jq -r .version launcher/src-tauri/tauri.conf.json)
          PKG_VERSION=$(jq -r .version launcher/package.json)
          echo "Tag: $TAG_VERSION  Tauri: $TAURI_VERSION  Package: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match tauri.conf.json $TAURI_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Generate changelog
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: bun scripts/curate-changelog.ts

      - name: Build launcher (.dmg)
        run: |
          rm -rf launcher/src-tauri/target/release/bundle/dmg
          just launcher-build

      - name: Smoke test (sidecar + TLS)
        run: just launcher-smoke

      - name: Upload smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-macos
          path: |
            /tmp/**/sidecar.log
            /private/tmp/**/sidecar.log
            /var/folders/**/sidecar.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: launcher/src-tauri/target/release/bundle/dmg/*.dmg
          include-hidden-files: true

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: .changelog.md

  # --- Build .msi on Windows (x86_64) ---
  build-windows:
    name: Build Windows (x64)
    needs: gate
    runs-on: windows-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: leyline,forge

      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - uses: actions/cache@v4
        with:
          path: forge/.m2-local/forge/
          key: upstream-m2-${{ hashFiles('forge/forge-core/src/**', 'forge/forge-game/src/**', 'forge/forge-ai/src/**', 'forge/forge-gui/src/**', 'forge/pom.xml') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            launcher/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('launcher/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: extractions/setup-just@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install forge JARs
        shell: bash
        run: just install-forge

      - name: Install launcher deps
        run: cd launcher && bun install

      - name: Version check
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TAURI_VERSION=$(jq -r .version launcher/src-tauri/tauri.conf.json)
          PKG_VERSION=$(jq -r .version launcher/package.json)
          echo "Tag: $TAG_VERSION  Tauri: $TAURI_VERSION  Package: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$TAURI_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match tauri.conf.json $TAURI_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi

      - name: Build launcher (NSIS installer)
        shell: bash
        run: |
          rm -rf launcher/src-tauri/target/release/bundle/nsis
          just launcher-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: launcher/src-tauri/target/release/bundle/nsis/*.exe

  # --- Create GitHub Release with all artifacts ---
  release:
    name: Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG="$(cat artifacts/changelog/.changelog.md)"

          DMG=$(ls artifacts/macos-dmg/*.dmg)
          SETUP=$(ls artifacts/windows-setup/*.exe)

          DMG_NAME="Leyline_${VERSION}_aarch64.dmg"
          SETUP_NAME="Leyline_${VERSION}_x64-setup.exe"
          cp "$DMG" "$DMG_NAME"
          cp "$SETUP" "$SETUP_NAME"

          gh release create "$GITHUB_REF_NAME" \
            --title "Leyline $VERSION" \
            --notes "$CHANGELOG" \
            "$DMG_NAME" \
            "$SETUP_NAME"
