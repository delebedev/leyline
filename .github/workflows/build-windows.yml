name: Build Windows

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: leyline,forge

      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - uses: actions/cache@v4
        with:
          path: forge/.m2-local/forge/
          key: upstream-m2-${{ hashFiles('forge/forge-core/src/**', 'forge/forge-game/src/**', 'forge/forge-ai/src/**', 'forge/forge-gui/src/**', 'forge/pom.xml') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            launcher/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('launcher/src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: extractions/setup-just@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install forge JARs
        shell: bash
        run: |
          cd forge && mvn org.codehaus.mojo:flatten-maven-plugin:1.6.0:flatten install \
            -Dmaven.repo.local="$GITHUB_WORKSPACE/forge/.m2-local" \
            -pl forge-core,forge-game,forge-ai,forge-gui -am -DskipTests -q
          cd "$GITHUB_WORKSPACE/forge" && git log -1 --format=%H -- forge-core/src forge-game/src forge-ai/src forge-gui/src pom.xml > "$GITHUB_WORKSPACE/.upstream-installed"

      - name: Build Kotlin + bundle
        shell: bash
        run: ./gradlew bundleArchive --no-daemon --no-configuration-cache

      - name: Install launcher deps
        run: cd launcher && bun install

      - name: Stage bundle for Tauri
        shell: bash
        run: |
          rm -rf launcher/src-tauri/.bundle-stage
          mkdir -p launcher/src-tauri/.bundle-stage
          cp -R build/bundle launcher/src-tauri/.bundle-stage/leyline
          tar -xzf build/dist/leyline-*.tgz -C launcher/src-tauri/.bundle-stage/leyline --strip-components=1 leyline/res || true
          mkdir -p launcher/src-tauri/.bundle-stage/leyline/data
          cp data/player.db launcher/src-tauri/.bundle-stage/leyline/data/player.db 2>/dev/null \
            || cp launcher/resources/player.db launcher/src-tauri/.bundle-stage/leyline/data/player.db
          echo "ci changelog" > launcher/src-tauri/.bundle-stage/changelog.md

      - name: Build launcher (.msi)
        shell: bash
        run: |
          rm -rf launcher/src-tauri/target/release/bundle/msi
          # CalVer → MSI-compatible version (major must be < 256)
          CALVER=$(grep '"version"' launcher/src-tauri/tauri.conf.json | head -1 | sed 's/.*: "//;s/".*//')
          MSI_VER="0.${CALVER#*.}"
          echo "Version: $CALVER → MSI $MSI_VER"
          cd launcher && bun tauri build --config "{\"bundle\":{\"resources\":[\".bundle-stage/leyline/\",\".bundle-stage/changelog.md\"]},\"version\":\"$MSI_VER\"}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: launcher/src-tauri/target/release/bundle/msi/*.msi
