services:
  leyline:
    image: ghcr.io/delebedev/leyline:latest
    restart: unless-stopped
    ports:
      - "30010:30010"   # FrontDoor TLS TCP (bypasses Traefik)
      - "30003:30003"   # MatchDoor TLS TCP (bypasses Traefik)
    expose:
      - "9443"          # MockWAS — only Traefik reaches this
    volumes:
      - certs:/certs:ro
      - ./data/carddb:/data/carddb:ro
    environment:
      # traefik-certs-dumper with --domain-subdir produces:
      #   /output/<domain>/certificate.crt + privatekey.key
      - LEYLINE_CERT_PATH=/certs/${DOMAIN}/certificate.crt
      - LEYLINE_KEY_PATH=/certs/${DOMAIN}/privatekey.key
      - LEYLINE_CARD_DB=/data/carddb/Raw_CardDatabase.mtga
      - LEYLINE_FD_HOST=${DOMAIN}:30010
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.leyline.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.leyline.entrypoints=websecure"
      - "traefik.http.routers.leyline.tls=true"
      - "traefik.http.routers.leyline.tls.certresolver=mytlschallenge"
      - "traefik.http.services.leyline.loadbalancer.server.port=9443"
      - "traefik.http.services.leyline.loadbalancer.server.scheme=https"
      - "traefik.http.services.leyline.loadbalancer.serversTransport=leyline-insecure@file"
    networks:
      - default
      - traefik_proxy

  # Extract Let's Encrypt PEM certs from Traefik's acme.json for Netty FD/MD
  certs-dumper:
    image: ldez/traefik-certs-dumper:v2.11.0
    restart: unless-stopped
    volumes:
      - traefik_data:/traefik:ro
      - certs:/output
    command: file --version v2 --source /traefik/acme.json --dest /output --domain-subdir --watch

volumes:
  certs:
  traefik_data:
    external: true

networks:
  traefik_proxy:
    external: true
