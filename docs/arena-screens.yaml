# Arena Screen State Machine
#
# Screens the agent can be on, how to detect them, and how to navigate between them.
# Two detection layers:
#   1. Player.log Client.SceneChange (authoritative for lobby screens — "scene" field)
#   2. OCR anchors (fallback, also covers in-game screens with no SceneChange)
#
# Usage: arena navigate <target>
#   Finds shortest path from current screen to target, executes each transition step.

screens:

  # --- Lobby ---

  Home:
    scene: Home                          # Player.log toSceneName
    ocr_anchors: ["Play", "Home"]        # fallback detection
    ocr_reject: ["Keep", "Concede"]      # rules out false matches
    description: Main lobby. Entry point after login.

  Play:
    scene: Home                          # same scene as Home (sub-screen)
    ocr_anchors: ["Find Match", "Events"]
    description: Play menu with tabs for Find Match, Events, Recently Played.

  FindMatch:
    scene: Home
    ocr_anchors: ["Bot Match"]
    ocr_either: ["My Decks", "Invalid Decks"]
    description: Find Match tab — queue picker + deck list.

  DeckSelected:
    scene: Home
    ocr_anchors: ["Edit Deck"]
    description: A deck is highlighted in Find Match. Play button active.

  Events:
    scene: Home
    ocr_anchors: ["Events"]
    ocr_either: ["All", "In Progress", "Limited", "Constructed"]
    description: Events tab listing available events.

  EventLanding:
    scene: EventLanding
    ocr_either: ["Start", "Resume", "Build Your Deck", "Resign", "Play"]
    description: Event blade — details for a specific event.

  DeckBuilder:
    scene: DeckBuilder                   # likely scene name (needs confirmation)
    ocr_anchors: ["Cards"]               # "N/40 Cards"
    ocr_either: ["Done"]
    description: Sealed/limited deck builder.

  # --- Draft ---

  DraftPick:
    scene: null                          # no SceneChange observed yet
    ocr_anchors: ["Confirm Pick"]
    ocr_either: ["Pack"]
    description: Draft card selection screen.

  DraftVault:
    scene: null
    ocr_anchors: ["Vault Progress"]
    description: Post-draft vault progress overlay.

  # --- In-Game ---

  BannedCards:
    scene: Home
    ocr_anchors: ["Banned"]
    ocr_either: ["Okay"]
    description: Banned cards popup on first login. Dismiss with Okay.

  Mulligan:
    scene: null                          # in-game, no SceneChange
    ocr_anchors: ["Keep"]
    ocr_either: ["Mulligan"]
    description: Opening hand mulligan decision.

  InGame:
    scene: null
    detect: debug_api                    # use /api/state matchId != null
    ocr_either: ["Pass", "Next", "Resolve", "End Turn", "My Turn", "Opponent's Turn"]
    description: Active gameplay. State from debug API, not OCR.

  ConcedMenu:
    scene: null
    ocr_anchors: ["Concede"]
    description: Settings overlay with Concede option.

  Result:
    scene: null
    ocr_either: ["DEFEAT", "VICTORY"]
    description: Match result screen. Click center to dismiss.

  Reconnecting:
    scene: null
    ocr_anchors: ["Waiting for Server"]
    description: Client lost connection. Restart server + relaunch.


# --- Transitions ---
# Each transition: from -> to, action to take, confirmation signal.
# Actions are arena CLI commands. Confirmations are wait conditions.

transitions:

  # Home -> Play
  - from: Home
    to: Play
    action: click "Play" --retry 3
    wait: text="Find Match"
    wait_timeout: 5

  # Play -> Find Match
  - from: Play
    to: FindMatch
    action: click "Find Match" --retry 3
    wait: text="Bot Match"
    wait_timeout: 5

  # Find Match -> Deck Selected (Bot Match)
  - from: FindMatch
    to: DeckSelected
    action: |
      click "Bot Match" --retry 3
      sleep 1
      click "My Decks" --retry 3
      sleep 1
    wait: text="Edit Deck"
    wait_timeout: 5
    note: Still need to click a deck thumbnail. Navigator stops here; caller picks deck.

  # Deck Selected -> Mulligan (start game)
  - from: DeckSelected
    to: Mulligan
    action: click "Play" --retry 3
    wait: text="Keep"
    wait_timeout: 30
    note: Triggers matchmaking. VS screen plays, then mulligan.

  # Play -> Events
  - from: Play
    to: Events
    action: click "Events" --retry 3
    wait_timeout: 5
    note: Events tab loads within the Play screen.

  # Events -> EventLanding
  - from: Events
    to: EventLanding
    wait: scene=EventLanding
    wait_timeout: 5
    note: Requires clicking an event tile. Navigator stops; caller clicks tile.

  # EventLanding -> Home (back)
  - from: EventLanding
    to: Home
    action: click "Home" --retry 3
    wait: scene=Home
    wait_timeout: 5

  # EventLanding -> DeckBuilder (sealed)
  - from: EventLanding
    to: DeckBuilder
    action: click "Build Your Deck" --retry 3
    wait: text="Cards"
    wait_timeout: 10

  # DeckBuilder -> EventLanding (submit deck)
  - from: DeckBuilder
    to: EventLanding
    action: click "Done" --retry 3
    wait: scene=EventLanding
    wait_timeout: 5

  # EventLanding -> Mulligan (play from event)
  - from: EventLanding
    to: Mulligan
    action: click "Play" --retry 3
    wait: text="Keep"
    wait_timeout: 30

  # Mulligan -> InGame
  - from: Mulligan
    to: InGame
    action: click "Keep" --retry 3
    wait: phase=PRECOMBAT_MAIN
    wait_timeout: 15

  # InGame -> ConcedMenu
  - from: InGame
    to: ConcedMenu
    action: click 940,42
    wait: text="Concede"
    wait_timeout: 3

  # ConcedMenu -> Result
  - from: ConcedMenu
    to: Result
    action: click "Concede" --retry 3
    wait_timeout: 10
    wait_either: ["DEFEAT", "VICTORY"]

  # Result -> Home
  - from: Result
    to: Home
    action: |
      click 480,300
      sleep 2
      click 480,300
      sleep 2
      click 480,300
    wait: scene=Home
    wait_timeout: 15

  # Home -> Home (no-op, already there)
  - from: Home
    to: Home

  # BannedCards -> Home
  - from: BannedCards
    to: Home
    action: click "Okay" --retry 3
    wait: scene=Home
    wait_timeout: 10
    note: May need multiple clicks for successive popups.

  # FindMatch -> Home (back)
  - from: FindMatch
    to: Home
    action: click "Home" --retry 3
    wait: scene=Home
    wait_timeout: 5

  # Play -> Home (back)
  - from: Play
    to: Home
    action: click "Home" --retry 3
    wait: scene=Home
    wait_timeout: 5
