# ─── Zone Transfers ──────────────────────────────────────────────────
# Transfer categories control what animation the client plays when a card
# moves between zones. Cards always move correctly — the category just
# determines which animation fires. Missing categories fall back to
# generic ZoneTransfer (code 2).
#
# 14 of 21 categories wired. The remaining 7 still move cards correctly,
# just with a generic animation instead of the specific one.
#
# Ordered: wired first, then missing by importance.

zone-transfers:

  # ── Wired (14) ────────────────────────────────────────────────────

  cast-spell:
    status: wired
    notes: "Hand → Stack. Category 6."

  play-land:
    status: wired
    notes: "Hand → Battlefield. Category 7."

  resolve:
    status: wired
    notes: "Stack → Battlefield (or graveyard for non-permanents). Category 13."

  draw:
    status: wired
    notes: "Library → Hand. Category 10."

  destroy:
    status: wired
    notes: "Battlefield → Graveyard. Category 17."

  sacrifice:
    status: wired
    notes: "Battlefield → Graveyard (via effect). Category 18."

  discard:
    status: wired
    notes: "Hand → Graveyard. Category 11."

  exile:
    status: wired
    notes: "Any → Exile. Category 16."

  countered:
    status: wired
    notes: "Stack → Graveyard (spell countered). Category 9."

  bounce:
    status: wired
    notes: "Battlefield → Hand/Library. Category 32."

  mill:
    status: wired
    notes: "Library → Graveyard (same owner). Category 33."

  return:
    status: wired
    notes: >
      GY/Exile → Hand/Battlefield. Category 8.
      Zone-pair heuristic in AnnotationBuilder.zoneChangedCategory().

  search:
    status: wired
    notes: >
      Library → Battlefield. Category 14.
      Zone-pair heuristic (Library→BF). Library→Hand stays Draw.

  put:
    status: wired
    notes: >
      Generic any → any. Category 19.
      Available as TransferCategory enum; used when no specific
      zone-pair match applies and caller explicitly selects Put.

  # ── Missing — SBA reason variants ─────────────────────────────────
  # All BF→GY with different reason codes. GameEventCardChangeZone
  # doesn't carry a reason field, so distinguishing requires either
  # engine event enrichment (wide blast radius) or fragile collector-
  # side heuristics. Client plays the same death animation for all.
  # Low payoff, high cost — deliberately deferred.

  zero-toughness:
    status: missing
    notes: "Battlefield → Graveyard (0 toughness SBA). Category 20. Falls back to Destroy animation."

  damage:
    status: missing
    notes: "Battlefield → Graveyard (lethal damage SBA). Category 21. Falls back to Destroy animation."

  zero-loyalty:
    status: missing
    notes: "Battlefield → Graveyard (0 loyalty PW). Category 24. Falls back to Destroy animation."

