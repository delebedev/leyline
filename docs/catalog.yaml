    notes: "Battlefield → Graveyard (legend rule). Category 25. Falls back to Destroy animation."

  illegal-attachment:
    status: missing
    notes: "Battlefield → Graveyard (aura/equip lost target). Category 22. Falls back to Destroy animation."

  unattached-aura:
    status: missing
    notes: "Battlefield → Graveyard (aura not attached). Category 23. Falls back to Destroy animation."

  # ── N/A ───────────────────────────────────────────────────────────

  conjure:
    status: n/a
    notes: "Digital-only creation. Category 37. Not relevant for paper MTG."


