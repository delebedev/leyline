# Nexus Mechanic Catalog
#
# What works when the Arena client connects to Forge via nexus.
# Organized by what a player would ask about, not protocol internals.
#
# Status values:
#   works     — end-to-end functional, tested, player can use it
#   wired     — plumbing exists, happy path works, edge cases or UX rough
#   partial   — some sub-cases work, others don't or are missing
#   broken    — code exists but doesn't function correctly
#   missing   — not implemented in the nexus layer
#   suppressed — deliberately disabled (cosmetic, causes client errors)
#   n/a       — not applicable to Arena Standard/Pioneer
#
# Updated: 2026-03-19
# Authoritative source for protocol-level detail: rosetta.md

# ─── Client Infrastructure ───────────────────────────────────────────
# The connection layers outside the game scene itself.

client-infrastructure:
  front-door:
    status: wired
    notes: >
      Fully offline FD stub on :30010 with 30+ CmdType handlers.
      Protobuf envelope codec (Cmd/Request/Response), golden data for
      StartHook, GraphDefs, Events, PlayBladeQueueConfig, DesignerMetadata.
      Auth → lobby → Play → Bot Match → MatchCreated push all work offline.
      FdDebugCollector (ring buffer + SSE) for real-time inspection.
      CaptureSink records frames to JSONL for replay. FrontDoorReplayStub
      replays captured sessions. Key insight: S→C always Response envelope,
      push notifications use fresh txId. See front-door-stub.md in
      client decompilation for protocol lessons.

  ui-automation:
    status: wired
    notes: >
      Synthetic mouse clicks via bin/click (CGEvent + mach_absolute_time).
      Works on macOS 15+ with Unity — window must be foreground. Supports
      left/right/double click and move. Screenshot capture via just
      capture-screenshot. client-auto.sh provides log-driven state machine
      for automated client interaction. Coordinate system: logical points
      (1920x1080), screenshots downscaled to 1280px (1.5x factor).

  match-door:
    status: wired
    notes: >
      Netty TLS on :30020. 6-byte framing + protobuf. Handles ConnectReq,
      settings exchange, mulligan, then enters game loop. Production-path
      MatchHandler → MatchSession dispatch. FamiliarSession (PR #82) provides
      type-safe read-only mirror for the non-active seat — replaces scattered
      isFamiliar boolean gates with SessionOps interface polymorphism.
      Per-seat GamePlayback for symmetric opponent diffs.

  concede:
    status: works
    notes: >
      ConcedeReq (type 7) → sendGameOver(Concede) → 3x GSM + IntermissionReq
      + MatchCompleted room state. Client shows result screen. Bridge stays
      alive after concede (deferred cleanup). Fixed 2026-02-26.

  game-over:
    status: works
    notes: >
      gameOverBundle() sends 3x GSM (GameComplete→MatchComplete→bare diff)
      + IntermissionReq with options/prompt + MatchCompleted room state.
      Matches real server recording structure. Both lethal damage and concede
      produce the result screen. LossOfGame annotation on lethal. Fixed 2026-02-26.

  timers:
    status: wired
    notes: >
      TimerStateMessage (GRE type 56) implemented. Decision timer sent on
      priority grant (timerStart) and cleared on client response (timerStop).
      Duration configurable via game.timer in playtest.toml. Client shows
      rope countdown.

  starting-player:
    status: wired
    notes: >
      ChooseStartingPlayerReq (type 6) sent to seat 2 after DieRollResults.
      ChooseStartingPlayerResp handled in MulliganHandler → triggers mulligan flow.

  settings:
    status: works
    notes: >
      SetSettingsReq/Resp with full delta-merge semantics. Stops accumulated
      by (stopType, appliesTo) key — client sends one toggle per message,
      server merges and echoes back. Team scope → own-turn phase stops,
      Opponents scope → opponent-turn stops. autoPassOption, stackAutoPassOption,
      autoPassPriority (full control) all wired. clearAllStops/clearAllYields
      honored. Transient stops merged same as regular stops.

  sealed-events:
    status: wired
    notes: >
      Full sealed format lifecycle: join → Forge pack generation (6 boosters via
      UnOpenedProduct) → grpId mapping → pack opening UI → deck builder (40-card)
      → match against Sparky AI → result callback updates Course wins/losses.
      Course domain model with SQLite persistence. EventWireBuilder matches golden
      wire shape (LossDetailsDisplay, SelectedDeckWidget, CourseDeckSummary).
      Event blade shows loss counter. Deck edit button present but not yet tested
      end-to-end. Course deck lookup crosses FD→MD boundary via deckLookup lambda.
      Sets: FDN tested. Any set with Forge booster template should work.

  quick-draft:
    status: wired
    notes: >
      Quick Draft (BotDraft) lifecycle: join → BotDraft_StartDraft → 3×14-card
      packs with bot-simulated picks → BotDraft_DraftPick per selection →
      BotDraft_DraftStatus polling → card pool grant → deck builder (40-card)
      → match against Sparky AI → Course result callback. DraftSession model
      with SQLite persistence, parallels Course. BotDraft CmdTypes 1800-1802
      handled in FrontDoorHandler. Forge pack generation via UnOpenedProduct
      (same as sealed). EventDef uses FormatType "Draft", EventTag "QuickDraft".

  emotes:
    status: missing

  reconnect:
    status: missing
    notes: "No session persistence. Disconnect = game lost."


# ─── Game Flow ────────────────────────────────────────────────────────
# Turn structure, priority, phases — the skeleton of a game.

game-flow:
  turn-structure:
    status: wired
    notes: >
      Untap → Upkeep → Draw → Main1 → Combat → Main2 → End → Cleanup.
      Works but every phase grants priority (see phase-stops).

  priority:
    status: works
    notes: >
      Two-layer priority system: engine-side (WebPlayerController) handles
      own-turn phase skipping (SmartPhaseSkip, PhaseNotStopped, EndTurnFlag),
      session-side (AutoPassEngine) handles opponent-turn auto-pass and
      action-based decisions (OnlyPassActions, ClientAutoPass). Full control
      mode (autoPassPriority=No) disables all auto-passing. PriorityDecision
      typed sealed class tracks decisions. Debug: /api/priority-log shows
      both layers. ShouldStopEvaluator determines which action types are
      stop-worthy (Cast/Play/Activate = stop, Pass/FloatMana/ActivateMana = pass).

  phase-stops:
    status: works
    notes: >
      PhaseStopProfile tracks per-player stops. Human defaults: Main1,
      Attackers, Blockers, Main2. AI defaults: CombatBegin, Attackers,
      Blockers, EndOfTurn (engine combat logic). Client SetSettingsReq
      with Team scope overrides human stops, Opponents scope drives
      session-layer opponent-turn stops (separate from AI engine defaults).
      clearAllStops/clearAllYields supported.

  phase-indicator:
    status: broken
    notes: >
      Player and AI phase indicators update in sync (should be separate).

  mulligan:
    status: wired
    notes: >
      London mulligan end-to-end: MulliganReq with mulliganCount/numCards,
      mull re-deals hand (nuke-and-repave instanceIds via diffDeletedInstanceIds),
      auto-tuck (first N cards put on bottom, matching forge-web). "Keep X" label
      correct post-mull. Die roll randomized (seeded via MyRandom).
      Deferred: proper tuck UI via GroupReq/GroupResp — code written + golden-tested
      but not wired (auto-tuck handles it). GroupResp handler ready for future use.

  upkeep-triggers:
    status: wired
    notes: "Triggers fire on upkeep, go on stack, resolve normally."

  draw-step:
    status: wired
    notes: "Active player draws. Draw annotation fires."

  cleanup-discard:
    status: partial
    notes: >
      Engine forces discard to hand size. Hand overflow prompt was stalling
      (fixed 2026-02-21) but discard interaction may still be rough.


# ─── Spells & Stack ──────────────────────────────────────────────────

spells:
  cast-creature:
    status: wired
    notes: "Cast from hand → stack → resolve → battlefield. Auto-tap works."

  cast-instant:
    status: wired
    notes: >
      Casting works. Targeting wired (fixed 2026-02-21, needs client QA).
      Player receives SelectTargetsReq for targeted instants.

  cast-sorcery:
    status: wired
    notes: "Same as creature — cast, stack, resolve."

  cast-enchantment:
    status: wired
    notes: >
      Non-aura enchantments cast and resolve. Aura attachment annotations
      (AttachmentCreated + persistent Attachment) fire on GameEventCardAttachment.
      Client shows visual link between aura and enchanted permanent.

  cast-artifact:
    status: wired
    notes: >
      Casts and resolves. Equipment attachment annotations fire on equip.
      Client shows visual link between equipment and equipped creature.
      Equip ability: abilityGrpId 1268, goes to stack as Ability object (grpId=1268),
      uses SelectTargetsReq/SubmitTargetsReq for target selection (promptId 1010).
      Mana payment via UserActionTaken/ManaPaid inline (no PayCostsReq for equip cost).
      Re-equip: old Attachment pAnn deleted when host dies; LayeredEffect pAnn id
      persists but affectedIds updated to new host. New Attachment pAnn gets fresh id.
      Triggered abilities on equipment (e.g. "deal combat damage → create token") have
      their own separate grpId (e.g. Goldvein Pick trigger = 116799); AbilityInstanceCreated
      affectorId = equipment iid; TriggeringObject affectorId = trigger ability iid,
      affectedIds = attacking creature. Confirmed 2026-03-22 via Goldvein Pick (grpId 93966).

  cast-planeswalker:
    status: wired
    notes: >
      Casts and enters battlefield. Loyalty counters tracked.
      Multi-ability dispatch maps abilityGrpId→Forge ability index
      (supports +N/-N/-ultimate selection). Emblem zone not mapped.
      LoyaltyActivationsRemaining annotation missing.

  optional-costs:
    status: wired
    notes: >
      Kicker, buyback, entwine, bargain, and all optional additional costs.
      Session layer intercepts Cast, checks for optional costs via
      GameActionUtil.getOptionalCostValues, sends CastingTimeOptionsReq
      with per-cost type (Kicker, AdditionalCost, OptionalCost). Client
      shows "Choose One" modal. Response stashed for engine's
      chooseOptionalCosts. Auto-accept fallback for MatchHarness.

  cast-mdfc:
    status: missing
    notes: "CastMdfc/PlayMdfc action types not implemented."

  cast-adventure:
    status: missing
    notes: >
      Five gaps: (1) ActionMapper never emits CastAdventure action for adventure-capable hand cards.
      (2) MatchSession has no CastAdventure arm — falls to PassPriority.
      (3) AnnotationPipeline.inferCategory: exile→stack falls to ZoneTransfer, should be CastSpell.
      (4) ObjectMapper always emits type=Card; adventure objects on stack/exile need type=Adventure(10).
      (5) DisplayCardUnderCard annotation (type 38) not wired — visual only, not blocking.
      Spec: docs/plans/2026-03-21-adventure-wire-spec.md.
      Recording gap: no adventure cast observed in 2026-03-21_21-22-14 — need new proxy recording.

  cast-split:
    status: missing
    notes: "CastLeft/CastRight action types not implemented."

  cast-prototype:
    status: missing
    notes: "CastPrototype action type not implemented."

  cast-room:
    status: missing
    notes: "CastLeftRoom/CastRightRoom action types not implemented."

  cast-foretell:
    status: missing
    notes: "CastOmen action type not implemented."

  library-search:
    status: missing
    notes: >
      SearchReq (GRE type 44) / SearchResp handshake not implemented.
      Engine resolves chooseSingleCard internally but client gets no search UI.
      For human player searching, game would stall. Transfer category wrong:
      Library→Hand search should use Put (19) not Draw (10). RevealedCard
      proxy objects and zone-19 (Revealed) update not emitted. InstanceRevealedToOpponent
      (type 75) persistent annotation missing — opponent won't see revealed card.
      Wire spec: docs/plans/2026-03-21-library-search-wire-spec.md.
      Recording: 2026-03-21_22-05-00, Bushwhack (93928), gsId 52-54.

  modal-etb:
    status: wired
    notes: >
      CastingTimeOptionsReq (GRE) sent when a spell has modal enter-the-battlefield
      choices (e.g. charms, Eldritch Evolution). Client shows choice UI.
      CastingTimeOptionsResp handler wired. PR #84.

  surveil:
    status: wired
    notes: >
      Surveil mechanic end-to-end. GameEventSurveil → Surveil game event.
      CardSurveiled enriched zone event fires with Surveil transfer category.
      Scry annotation (65) reused for the look-at-top visual.

  stack-resolution:
    status: wired
    notes: >
      LIFO resolution. ResolutionStart/ResolutionComplete annotations fire.
      AbilityInstanceCreated/Deleted track stack objects.

  counterspell:
    status: wired
    notes: "Countered category fires, spell → graveyard."

  fizzle:
    status: wired
    notes: "Spell fizzles if all targets illegal. SpellResolved(fizzled=true)."

  mana-payment:
    status: works
    notes: >
      autoTapSolution provides one-click casting (greedy solver: colored first,
      then generic). ~95% correct. Manual tap via ActivateMana works end-to-end
      (taps permanent, produces mana, loops back for next action without
      consuming priority). ManaPaid annotation carries affectorId (land),
      id (payment counter), and color (bitmask). Per-land mana payment block
      emits AIC/TUP/UAT-mana/ManaPaid/AID sequence matching real server.
      Treasure sacrifice for mana emits the same bracket (AIC/TUP/OIC/
      ZoneTransfer-Sacrifice/UAT-actionType4/ManaPaid/AID) — full conformance.
      Known gap: abilityGrpId=0 instead of 183 (Treasure tap-for-mana ability)
      pending AbilityRegistry (#160).

  float-mana:
    status: missing
    notes: "FloatMana action type observed in Arena but not generated by nexus."

  convoke-improvise:
    status: partial
    notes: "Cost reduction partially fixed (2026-02-21). Edge cases remain."


# ─── Combat ──────────────────────────────────────────────────────────

combat:
  declare-attackers:
    status: wired
    notes: >
      DeclareAttackersReq sent to active player. Iterative per-creature
      toggles with echo-back GSM (provisional attackState + tap). Cancel
      button works (CancelActionReq → empty attackers → pass combat).
      All Attack button works (selectedDamageRecipient on committed attackers).
      XOR toggle for selectedAttackers. 13 CombatFlowTest + 3 BlockerDeclarationTest pass.

  declare-blockers:
    status: wired
    notes: >
      DeclareBlockersReq sent to defending player. Iterative toggle with
      echo-back GSM (provisional blockState). Root cause of regression fixed
      (passPriority was intercepting blocker pending). OrderBlockersReq
      (multi-blocker ordering) not implemented.

  combat-damage:
    status: wired
    notes: >
      Auto-distributed for unblocked attackers. DamageDealt annotation fires.
      Manual damage assignment (AssignDamageReq)
      not implemented. REGRESSED: affectedId resolution errors in tests.

  first-strike:
    status: wired
    notes: >
      Separate FirstStrikeDamage phase (step 11) occurs when relevant.
      Engine handles correctly.

  trample:
    status: partial
    notes: >
      Engine resolves excess damage correctly. Annotation for excess
      damage to player may not fire visually. Needs QA.

  deathtouch:
    status: wired
    notes: "Engine handles. Any damage = lethal for assignment purposes."

  lifelink:
    status: wired
    notes: "LifeChanged annotation fires for life gain from combat damage."

  vigilance:
    status: wired
    notes: "Engine handles (attacker doesn't tap). No special annotation needed."


# ─── Targeting ───────────────────────────────────────────────────────

targeting:
  spell-targeting:
    status: wired
    notes: >
      SelectTargetsReq sent for targeted spells. Single and multi-target.
      Fixed 2026-02-21 (creature targeting), 2026-02-25 (player targeting).
      12 tests in TargetingFlowTest (creature + player + cancel flows).

  player-targeting:
    status: wired
    notes: >
      Players use seatId (1/2) as instanceId in SelectTargetsReq target list.
      Opponent=Hot highlight, self/creatures=Cold. sourceId set to spell's
      post-realloc stack instanceId (client draws targeting arrow from source).
      allowCancel=Abort, allowUndo=true on GRE wrapper.
      Verified with bolt-face.pzl puzzle (bolt opponent at 3 life → game over).

  cancel-targeting:
    status: wired
    notes: >
      CancelActionReq (type 5) dispatched in MatchHandler → TargetingHandler.
      Submits empty target list → engine returns TargetSelectionResult(false,false)
      → spell unwinds (removed from stack, mana returned). Client returns to
      action selection. Tested in TargetingFlowTest (cancel + cancel-recast).

  ability-targeting:
    status: wired
    notes: "Same SelectTargetsReq path for activated abilities."

  targeting-arrows:
    status: partial
    notes: >
      sourceId field set on SelectTargetsReq (post-realloc instanceId) —
      client uses this to draw targeting arc from spell to cursor/target.
      PlayerSelectingTargets/PlayerSubmittedTargets annotations (92/93)
      not implemented — these are optional persistent arrow annotations.

  damage-assignment:
    status: missing
    notes: "AssignDamageReq (type 30) not sent. Damage auto-distributed."


# ─── Permanents & State ──────────────────────────────────────────────

permanents:
  tap-untap:
    status: wired
    notes: "TappedUntapped annotation fires. Untap step works."

  counters:
    status: wired
    notes: >
      +1/+1, -1/-1, loyalty, poison, stun. CounterAdded/CounterRemoved
      annotations fire with type and amount. Persistent Counter state
      annotation (type 14) tracks authoritative count per permanent.
      Counter annihilation works (engine handles +1/+1 canceling -1/-1).

  power-toughness-changes:
    status: wired
    notes: >
      ModifiedPower/ModifiedToughness annotations (5/6) fire via
      GameEventCardStatsChanged → PowerToughnessChanged. Collector tracks
      per-card P/T, emits events on delta. Client can show buff/debuff overlays.

  attachment:
    status: wired
    notes: >
      CreateAttachment (11), persistent Attachment (20), and
      RemoveAttachment (12) annotations all fire via
      GameEventCardAttachment → CardAttached/CardDetached.
      Full attach/detach lifecycle wired.

  tokens:
    status: wired
    notes: >
      GameEventTokenCreated enriched with List<Card> tokens (forge-game change).
      Collector wires TokenCreated events from EventBus. TokenCreated annotation
      fires with correct instanceId. TokenDeleted (41) emitted when tokens leave
      battlefield. Token grpId resolved via source card's AbilityIdToLinkedTokenGrpId
      mapping in CardDb. InvestigateEffect uses empty fallback (per-player loop).
      Treasure token grpId = 94178 (confirmed 2026-03-22). TokenCreated affectorId =
      trigger ability instance iid (not source permanent). TokenDeleted affectorId =
      post-ObjectIdChanged iid of the token. Sacrifice for mana: emits full mana-ability
      bracket (AbilityInstanceCreated/TappedUntappedPermanent/ObjectIdChanged/
      ZoneTransfer-Sacrifice/UserActionTaken-actionType4/ManaPaid/
      AbilityInstanceDeleted). SBA-cleaned tokens detected via disappeared-object
      post-pass. Known gap: abilityGrpId=0 (needs AbilityRegistry #160).
      Mana color in ManaPaid reflects player's chosen color (any-color source).

  face-down:
    status: missing
    notes: >
      ObjectMapper never sets isFacedown=true or overrides overlayGrpId.
      Morph/manifest/disguise cards would leak identity. Low priority for
      Standard/Pioneer.

  phasing:
    status: missing
    notes: >
      PhasedOut/PhasedIn annotations (95/96) not implemented.
      Forge tracks phasing as card state, not zone. GameEventCardPhased
      fires but not wired to nexus events.

  controller-change:
    status: missing
    notes: "ControllerChanged annotation (15) not implemented."

  color-change:
    status: missing
    notes: "ModifiedColor annotation (7) not implemented."

  type-change:
    status: missing
    notes: "ModifiedType annotation (25) not implemented."


# ─── Keywords ────────────────────────────────────────────────────────
# Status = does the mechanic work from the player's perspective?
# Most keywords just work because the engine handles them — the question
# is whether the client gets enough visual feedback.

keywords:
  flying:
    status: wired
    notes: "Engine resolves evasion. No annotation needed — blocking rules enforce it."

  reach:
    status: wired
    notes: "Engine allows blocking fliers. No annotation needed."

  haste:
    status: wired
    notes: "Engine allows attacking/activating on entry turn."

  flash:
    status: wired
    notes: "Engine allows casting at instant speed. Cast action available during opponent's turn."

  hexproof:
    status: wired
    notes: "Engine excludes from targeting. SelectTargetsReq won't include hexproof permanents."

  indestructible:
    status: wired
    notes: "Engine skips destroy. SBA won't kill."

  menace:
    status: wired
    notes: "Engine requires 2+ blockers. Blocking rules enforce it."

  ward:
    status: partial
    notes: "Trigger fires, counter-tax applied by engine. Visual feedback may be incomplete."

  double-strike:
    status: wired
    notes: "FirstStrikeDamage phase + regular CombatDamage both resolve."

  prowess:
    status: wired
    notes: "Trigger fires, P/T change applies. ModifiedPower/Toughness annotations wired."

  defender:
    status: wired
    notes: "Engine prevents attacking."

  protection:
    status: wired
    notes: "Engine handles DEBT (damage, enchant/equip, block, target)."

  regenerate:
    status: partial
    notes: >
      Engine handles. RegeneratePending/PermanentRegenerated annotations (99/100)
      missing — client won't show regen shield visual.

  threshold:
    status: missing
    notes: >
      Engine applies the continuous +1/+1 and deathtouch correctly (Forge handles it).
      Wire gap: AbilityWordActive (proto type 39) persistent annotation never emitted.
      This annotation tracks { threshold: 7, value: <GY count>, AbilityGrpId, AbilityWordName }
      and updates every diff. When value >= threshold, two persistent LayeredEffect annotations
      must be added: [ModifiedToughness, ModifiedPower, LayeredEffect] (effect_id=7002) and
      [AddAbility, LayeredEffect] (effect_id=7003, UniqueAbilityId=222 for deathtouch).
      The LayeredEffectCreated transient fires at ETB to pre-announce effect slots.
      Without AbilityWordActive, the client's threshold UI counter and conditional highlights
      are absent. Stat changes (p/t, ability count) still show correctly via object diff.
      Wire spec: docs/plans/2026-03-21-threshold-wire-spec.md
      Recording: recordings/2026-03-21_23-30-58/ (Dreadwing Scavenger grpId 93831, iid 295)

  loot:
    status: partial
    notes: >
      Engine fires draw+discard correctly. Draw and discard are delivered in separate gsId diffs:
      draw arrives first (ObjectIdChanged + ZoneTransfer category="Draw"), then discard
      (ObjectIdChanged + ZoneTransfer category="Discard" + ResolutionComplete + AbilityInstanceDeleted).
      No known gaps in annotation shape. Wire confirmed: recordings/2026-03-21_23-30-58/
      (Dreadwing Scavenger grpId 93831, loot trigger grpId 189406).


