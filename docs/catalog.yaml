# ─── Protocol Coverage Summary ───────────────────────────────────────
# See rosetta.md for full per-type breakdown.
#
# 94 annotation types exist in the Arena proto enum, but most are niche.
# We tier them by how often they matter in a typical Standard game.

protocol-summary:

  annotation-tiers:
    # ── Core: needed for most games, absence breaks UX ──────────────
    # 27 types. We have 16 working, 11 missing.
    core:
      have:
        - ZoneTransfer (1)          # every card move
        - DamageDealt (3)           # combat + burn
        - TappedUntapped (4)        # every mana tap, attack
        - PhaseOrStepModified (8)   # turn structure (hardcoded)
        - ModifiedLife (10)         # life total changes
        - ObjectIdChanged (13)      # zone transfer plumbing
        - CounterAdded (16)         # +1/+1, loyalty, poison
        - CounterRemoved (17)       # counter removal
        - AbilityInstanceCreated (36) # spell/ability on stack
        - AbilityInstanceDeleted (37) # spell/ability leaves stack
        - ResolutionStart (43)      # spell resolving
        - ResolutionComplete (44)   # spell resolved
        - NewTurnStarted (48)       # turn transitions (hardcoded)
        - EnteredZoneThisTurn (63)  # summoning sickness
        - Scry (65)                 # scry visual
        - Shuffle (56)              # suppressed — crashes client without detail keys
      missing:
        - ModifiedPower (5)         # every combat trick, anthem, equipment
        - ModifiedToughness (6)     # same — client can't show +X/+X overlays
        - AddAbility (9)            # "gains flying/haste/etc" — no keyword badge update
        - CreateAttachment (11)     # equip/enchant — no visual link between permanents
        - RemoveAttachment (12)     # unequip/disenchant
        - ControllerChanged (15)    # steal effects (Claim, Agent) — permanent doesn't move
        - TokenCreated (35)         # builder exists but not wired from EventBus
        - CardRevealed (47)         # tutors, impulse draw — no reveal animation
        - ManaPaid (34)             # stub only, no detail keys — mana payment visual
        - PlayerSelectingTargets (92)  # targeting arrows during cast
        - PlayerSubmittedTargets (93)  # targeting arrows confirmed

    # ── Nice-to-have: better UX, common-ish mechanics ──────────────
    # 20 types. We have 2 working, 18 missing.
    nice-to-have:
      have:
        - UserActionTaken (73)      # action feedback
        - SyntheticEvent (72)       # internal sequencing
      missing:
        - ModifiedColor (7)         # Painter's Servant etc
        - Counter (14)              # running tally for badge display (vs Added/Removed events)
        - LayeredEffectCreated (18) # buff source tracking
        - Attachment (20)           # state-based attachment info
        - RemoveAbility (23)        # "loses all abilities"
        - ModifiedType (25)         # type-changing effects
        - TargetSpec (26)           # targeting UI hints
        - FaceDown (28)             # morph/manifest/disguise
        - DynamicAbility (30)       # activated ability cost display
        - TokenDeleted (41)         # token leaves battlefield animation
        - CoinFlip (57)             # coin flip results
        - ReplacementEffect (62)    # replacement effect indicators
        - DieRoll (85)              # D20 cards, growing in Standard
        - LinkedDamage (87)         # damage source tracking
        - PhasedOut (95)            # phasing out visual
        - PhasedIn (96)             # phasing in visual
        - LoyaltyActivationsRemaining (97) # PW ability limits
        - RegeneratePending (99)    # regen shield visual

    # ── Niche: specific cards, digital-only, internal ───────────────
    # 47 types. We have 0. Most will never matter for paper-MTG play.
    niche:
      count: 47
      examples:
        - BoonInfo (102)            # digital-only conjure
        - DungeonStatus (86)        # D&D set mechanic
        - ClassLevel (88)           # D&D set mechanic
        - SaddledThisTurn (104)     # saddle mechanic
        - LoopCount (106)           # loop detection
        - SuppressedPowerAndToughness (108) # edge case display
        - Designation (45)          # monarch, initiative
        - SuspendLike (61)          # suspend/foretell/hideaway
        - CastingTimeOption (64)    # alt cast timing
        - MultistepEffectStarted (83) # multi-step resolution UI
      notes: >
        Full list in rosetta.md. Client degrades gracefully without these —
        game mechanics still work via the engine, just no visual flair.

  action-types:
    implemented: 3  # Cast, Play, Pass (end-to-end)
    wired: 2        # Activate, ActivateMana (generated, not all paths tested)
    total: 24
    notes: >
      Multi-face variants (10 types) deferred. FloatMana observed but not generated.

  zone-transfer-categories:
    implemented: 11
    total: 21
    notes: >
      11 wired, 3 worth adding (Return, Search, Put), 6 SBA reason
      variants (cosmetic — fall back to Destroy animation), 1 n/a.
      Cards always move correctly; category only affects animation.

  gre-message-types:
    server-to-client: 13  # implemented
    client-to-server: 6   # handled
    missing: 5             # ChooseStartingPlayer, OrderReq, SelectNreq, AssignDamageReq, TimerState

  game-events-wired:
    wired: 17
    total: 57
    notes: >
      Key unwired: CardAttachment, CardPhased, SpellRemovedFromStack,
      FlipCoin, RollDie, PlayerControl, CardStatsChanged.
