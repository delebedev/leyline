# ─── Zone Transfers ──────────────────────────────────────────────────
# Transfer categories control what animation the client plays when a card
# moves between zones. Cards always move correctly — the category just
# determines which animation fires. Missing categories fall back to
# generic ZoneTransfer (code 2).
#
# 11 of 21 categories wired. The remaining 10 still move cards correctly,
# just with a generic animation instead of the specific one.
#
# Ordered: wired first, then missing by importance.

zone-transfers:

  # ── Wired (11) ────────────────────────────────────────────────────

  cast-spell:
    status: wired
    notes: "Hand → Stack. Category 6."

  play-land:
    status: wired
    notes: "Hand → Battlefield. Category 7."

  resolve:
    status: wired
    notes: "Stack → Battlefield (or graveyard for non-permanents). Category 13."

  draw:
    status: wired
    notes: "Library → Hand. Category 10."

  destroy:
    status: wired
    notes: "Battlefield → Graveyard. Category 17."

  sacrifice:
    status: wired
    notes: "Battlefield → Graveyard (via effect). Category 18."

  discard:
    status: wired
    notes: "Hand → Graveyard. Category 11."

  exile:
    status: wired
    notes: "Any → Exile. Category 16."

  countered:
    status: wired
    notes: "Stack → Graveyard (spell countered). Category 9."

  bounce:
    status: wired
    notes: "Battlefield → Hand/Library. Category 32."

  mill:
    status: wired
    notes: "Library → Graveyard (same owner). Category 33."

  # ── Missing — common, worth adding ────────────────────────────────

  return:
    status: missing
    notes: >
      GY/Exile → Hand/Battlefield. Category 8.
      Reanimation, recursion, flicker — very common in Standard.
      Currently plays generic animation instead of return-specific one.

  search:
    status: missing
    notes: >
      Library → Hand/Battlefield. Category 14.
      Tutors, fetch effects. Common across most constructed decks.
      Currently plays generic animation.

  put:
    status: missing
    notes: >
      Generic any → any. Category 19.
      Catch-all for effects that say "put" rather than destroy/exile/etc.
      Falls back to generic — usually fine.

  # ── Missing — SBA reason variants ─────────────────────────────────
  # These are all "goes to graveyard" with different reason codes.
  # Engine handles the move; client just plays Destroy animation instead
  # of a more specific one. Low visual impact.

  zero-toughness:
    status: missing
    notes: "Battlefield → Graveyard (0 toughness SBA). Category 20. Falls back to Destroy animation."

  damage:
    status: missing
    notes: "Battlefield → Graveyard (lethal damage SBA). Category 21. Falls back to Destroy animation."

  zero-loyalty:
    status: missing
    notes: "Battlefield → Graveyard (0 loyalty PW). Category 24. Falls back to Destroy animation."

  legend:
    status: missing
    notes: "Battlefield → Graveyard (legend rule). Category 25. Falls back to Destroy animation."

  illegal-attachment:
    status: missing
    notes: "Battlefield → Graveyard (aura/equip lost target). Category 22. Falls back to Destroy animation."

  unattached-aura:
    status: missing
    notes: "Battlefield → Graveyard (aura not attached). Category 23. Falls back to Destroy animation."

  # ── N/A ───────────────────────────────────────────────────────────

  conjure:
    status: n/a
    notes: "Digital-only creation. Category 37. Not relevant for paper MTG."


