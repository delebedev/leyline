# Nexus Mechanic Catalog
#
# What works when the Arena client connects to Forge via nexus.
# Organized by what a player would ask about, not protocol internals.
#
# Status values:
#   works     — end-to-end functional, tested, player can use it
#   wired     — plumbing exists, happy path works, edge cases or UX rough
#   partial   — some sub-cases work, others don't or are missing
#   broken    — code exists but doesn't function correctly
#   missing   — not implemented in the nexus layer
#   suppressed — deliberately disabled (cosmetic, causes client errors)
#   n/a       — not applicable to Arena Standard/Pioneer
#
# Updated: 2026-02-25
# Authoritative source for protocol-level detail: rosetta.md

# ─── Client Infrastructure ───────────────────────────────────────────
# The connection layers outside the game scene itself.

client-infrastructure:
  front-door:
    status: wired
    notes: >
      Fully offline FD stub on :30010 with 30+ CmdType handlers.
      Protobuf envelope codec (Cmd/Request/Response), golden data for
      StartHook, GraphDefs, Events, PlayBladeQueueConfig, DesignerMetadata.
      Auth → lobby → Play → Bot Match → MatchCreated push all work offline.
      FdDebugCollector (ring buffer + SSE) for real-time inspection.
      CaptureSink records frames to JSONL for replay. FrontDoorReplayStub
      replays captured sessions. Key insight: S→C always Response envelope,
      push notifications use fresh txId. See front-door-stub.md in
      mtga-internals for protocol lessons.

  ui-automation:
    status: wired
    notes: >
      Synthetic mouse clicks via tools/click (CGEvent + mach_absolute_time).
      Works on macOS 15+ with Unity — window must be foreground. Supports
      left/right/double click and move. Screenshot capture via just
      capture-screenshot. client-auto.sh provides log-driven state machine
      for automated client interaction. Coordinate system: logical points
      (1920x1080), screenshots downscaled to 1280px (1.5x factor).

  match-door:
    status: wired
    notes: >
      Netty TLS on :30020. 6-byte framing + protobuf. Handles ConnectReq,
      settings exchange, mulligan, then enters game loop. Production-path
      MatchHandler → MatchSession dispatch.

  concede:
    status: broken
    notes: >
      ConcedeReq handler exists in MatchSession (type 7) but doesn't
      work end-to-end. Client button fires but game doesn't end cleanly.

  game-over:
    status: broken
    notes: >
      gameOverBundle() sends 3 GS Diff messages + IntermissionReq but
      prevGameStateId chain is broken (not set). Client may show blank
      game-over screen or fail to transition.

  timers:
    status: missing
    notes: "TimerStateMessage (type 56) not implemented."

  starting-player:
    status: missing
    notes: >
      ChooseStartingPlayerReq (type 6) not sent. Server always picks.

  settings:
    status: wired
    notes: >
      SetSettingsReq/Resp handled. Client can send settings, server acks.
      No actual behavior changes from settings yet.

  emotes:
    status: missing

  reconnect:
    status: missing
    notes: "No session persistence. Disconnect = game lost."


# ─── Game Flow ────────────────────────────────────────────────────────
# Turn structure, priority, phases — the skeleton of a game.

game-flow:
  turn-structure:
    status: wired
    notes: >
      Untap → Upkeep → Draw → Main1 → Combat → Main2 → End → Cleanup.
      Works but every phase grants priority (see phase-stops).

  priority:
    status: wired
    notes: >
      Double-pass mechanism works. Player gets ActionsAvailableReq,
      can pass or act. But no smart auto-pass — client prompted at
      every phase even when nothing can be done.

  phase-stops:
    status: broken
    notes: >
      PhaseStopProfile not wired. Every phase grants priority including
      CombatDamage/CombatEnd/EndOfTurn where Arena auto-passes. Client
      times out (120s) at unimportant phases, engine auto-passes silently.
      Blocked on PhaseOrStepModified annotation regression.

  phase-indicator:
    status: broken
    notes: >
      Player and AI phase indicators update in sync (should be separate).

  mulligan:
    status: partial
    notes: >
      MulliganReq sent, player can see hand and choose to keep.
      Cannot request re-deal (new hand) or scry after mulligan to 6 or fewer.

  upkeep-triggers:
    status: wired
    notes: "Triggers fire on upkeep, go on stack, resolve normally."

  draw-step:
    status: wired
    notes: "Active player draws. Draw annotation fires."

  cleanup-discard:
    status: partial
    notes: >
      Engine forces discard to hand size. Hand overflow prompt was stalling
      (fixed 2026-02-21) but discard interaction may still be rough.


# ─── Spells & Stack ──────────────────────────────────────────────────

spells:
  cast-creature:
    status: wired
    notes: "Cast from hand → stack → resolve → battlefield. Auto-tap works."

  cast-instant:
