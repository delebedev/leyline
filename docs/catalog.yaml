# Nexus Mechanic Catalog
#
# What works when the Arena client connects to Forge via nexus.
# Organized by what a player would ask about, not protocol internals.
#
# Status values:
#   works     — end-to-end functional, tested, player can use it
#   wired     — plumbing exists, happy path works, edge cases or UX rough
#   partial   — some sub-cases work, others don't or are missing
#   broken    — code exists but doesn't function correctly
#   missing   — not implemented in the nexus layer
#   suppressed — deliberately disabled (cosmetic, causes client errors)
#   n/a       — not applicable to Arena Standard/Pioneer
#
# Updated: 2026-03-08
# Authoritative source for protocol-level detail: rosetta.md

# ─── Client Infrastructure ───────────────────────────────────────────
# The connection layers outside the game scene itself.

client-infrastructure:
  front-door:
    status: wired
    notes: >
      Fully offline FD stub on :30010 with 30+ CmdType handlers.
      Protobuf envelope codec (Cmd/Request/Response), golden data for
      StartHook, GraphDefs, Events, PlayBladeQueueConfig, DesignerMetadata.
      Auth → lobby → Play → Bot Match → MatchCreated push all work offline.
      FdDebugCollector (ring buffer + SSE) for real-time inspection.
      CaptureSink records frames to JSONL for replay. FrontDoorReplayStub
      replays captured sessions. Key insight: S→C always Response envelope,
      push notifications use fresh txId. See front-door-stub.md in
      mtga-internals for protocol lessons.

  ui-automation:
    status: wired
    notes: >
      Synthetic mouse clicks via bin/click (CGEvent + mach_absolute_time).
      Works on macOS 15+ with Unity — window must be foreground. Supports
      left/right/double click and move. Screenshot capture via just
      capture-screenshot. client-auto.sh provides log-driven state machine
      for automated client interaction. Coordinate system: logical points
      (1920x1080), screenshots downscaled to 1280px (1.5x factor).

  match-door:
    status: wired
    notes: >
      Netty TLS on :30020. 6-byte framing + protobuf. Handles ConnectReq,
      settings exchange, mulligan, then enters game loop. Production-path
      MatchHandler → MatchSession dispatch.

  concede:
    status: works
    notes: >
      ConcedeReq (type 7) → sendGameOver(Concede) → 3x GSM + IntermissionReq
      + MatchCompleted room state. Client shows result screen. Bridge stays
      alive after concede (deferred cleanup). Fixed 2026-02-26.

  game-over:
    status: works
    notes: >
      gameOverBundle() sends 3x GSM (GameComplete→MatchComplete→bare diff)
      + IntermissionReq with options/prompt + MatchCompleted room state.
      Matches real server recording structure. Both lethal damage and concede
      produce the result screen. LossOfGame annotation on lethal. Fixed 2026-02-26.

  timers:
    status: wired
    notes: >
      TimerStateMessage (GRE type 56) implemented. Decision timer sent on
      priority grant (timerStart) and cleared on client response (timerStop).
      Duration configurable via game.timer in playtest.toml. Client shows
      rope countdown.

  starting-player:
    status: missing
    notes: >
      ChooseStartingPlayerReq (type 6) not sent. Server always picks.

  settings:
    status: works
    notes: >
      SetSettingsReq/Resp with full delta-merge semantics. Stops accumulated
      by (stopType, appliesTo) key — client sends one toggle per message,
      server merges and echoes back. Team scope → own-turn phase stops,
      Opponents scope → opponent-turn stops. autoPassOption, stackAutoPassOption,
      autoPassPriority (full control) all wired. clearAllStops/clearAllYields
      honored. Transient stops merged same as regular stops.

  sealed-events:
    status: wired
    notes: >
      Full sealed format lifecycle: join → Forge pack generation (6 boosters via
      UnOpenedProduct) → grpId mapping → pack opening UI → deck builder (40-card)
      → match against Sparky AI → result callback updates Course wins/losses.
      Course domain model with SQLite persistence. EventWireBuilder matches golden
      wire shape (LossDetailsDisplay, SelectedDeckWidget, CourseDeckSummary).
      Event blade shows loss counter. Deck edit button present but not yet tested
      end-to-end. Course deck lookup crosses FD→MD boundary via deckLookup lambda.
      Sets: FDN tested. Any set with Forge booster template should work.

  quick-draft:
    status: wired
    notes: >
      Quick Draft (BotDraft) lifecycle: join → BotDraft_StartDraft → 3×14-card
      packs with bot-simulated picks → BotDraft_DraftPick per selection →
      BotDraft_DraftStatus polling → card pool grant → deck builder (40-card)
      → match against Sparky AI → Course result callback. DraftSession model
      with SQLite persistence, parallels Course. BotDraft CmdTypes 1800-1802
      handled in FrontDoorHandler. Forge pack generation via UnOpenedProduct
      (same as sealed). EventDef uses FormatType "Draft", EventTag "QuickDraft".

  emotes:
    status: missing

  reconnect:
    status: missing
    notes: "No session persistence. Disconnect = game lost."


# ─── Game Flow ────────────────────────────────────────────────────────
# Turn structure, priority, phases — the skeleton of a game.

game-flow:
  turn-structure:
    status: wired
    notes: >
      Untap → Upkeep → Draw → Main1 → Combat → Main2 → End → Cleanup.
      Works but every phase grants priority (see phase-stops).

  priority:
    status: works
    notes: >
      Two-layer priority system: engine-side (WebPlayerController) handles
      own-turn phase skipping (SmartPhaseSkip, PhaseNotStopped, EndTurnFlag),
      session-side (AutoPassEngine) handles opponent-turn auto-pass and
      action-based decisions (OnlyPassActions, ClientAutoPass). Full control
      mode (autoPassPriority=No) disables all auto-passing. PriorityDecision
      typed sealed class tracks decisions. Debug: /api/priority-log shows
      both layers. ShouldStopEvaluator determines which action types are
      stop-worthy (Cast/Play/Activate = stop, Pass/FloatMana/ActivateMana = pass).

  phase-stops:
    status: works
    notes: >
      PhaseStopProfile tracks per-player stops. Human defaults: Main1,
      Attackers, Blockers, Main2. AI defaults: CombatBegin, Attackers,
      Blockers, EndOfTurn (engine combat logic). Client SetSettingsReq
      with Team scope overrides human stops, Opponents scope drives
      session-layer opponent-turn stops (separate from AI engine defaults).
      clearAllStops/clearAllYields supported.

  phase-indicator:
    status: broken
    notes: >
      Player and AI phase indicators update in sync (should be separate).

  mulligan:
    status: wired
    notes: >
      London mulligan end-to-end: MulliganReq with mulliganCount/numCards,
      mull re-deals hand (nuke-and-repave instanceIds via diffDeletedInstanceIds),
      auto-tuck (first N cards put on bottom, matching forge-web). "Keep X" label
      correct post-mull. Die roll randomized (seeded via MyRandom).
      Deferred: proper tuck UI via GroupReq/GroupResp — code written + golden-tested
      but not wired (auto-tuck handles it). GroupResp handler ready for future use.

  upkeep-triggers:
    status: wired
    notes: "Triggers fire on upkeep, go on stack, resolve normally."

  draw-step:
    status: wired
    notes: "Active player draws. Draw annotation fires."

  cleanup-discard:
    status: partial
    notes: >
      Engine forces discard to hand size. Hand overflow prompt was stalling
      (fixed 2026-02-21) but discard interaction may still be rough.


