    notes: >
      Casting works. Targeting wired (fixed 2026-02-21, needs client QA).
      Player receives SelectTargetsReq for targeted instants.

  cast-sorcery:
    status: wired
    notes: "Same as creature — cast, stack, resolve."

  cast-enchantment:
    status: partial
    notes: >
      Non-aura enchantments cast and resolve. Aura attachment annotation
      missing (CreateAttachment/RemoveAttachment) — aura goes to battlefield
      but client doesn't show visual link to enchanted permanent.

  cast-artifact:
    status: partial
    notes: "Casts and resolves. Equipment same issue as auras — no attachment visual."

  cast-planeswalker:
    status: partial
    notes: >
      Casts and enters battlefield. Loyalty counters tracked.
      Ability activation wired. Emblem zone not mapped.
      LoyaltyActivationsRemaining annotation missing.

  cast-mdfc:
    status: missing
    notes: "CastMdfc/PlayMdfc action types not implemented."

  cast-adventure:
    status: missing
    notes: "CastAdventure action type not implemented."

  cast-split:
    status: missing
    notes: "CastLeft/CastRight action types not implemented."

  cast-prototype:
    status: missing
    notes: "CastPrototype action type not implemented."

  cast-room:
    status: missing
    notes: "CastLeftRoom/CastRightRoom action types not implemented."

  cast-foretell:
    status: missing
    notes: "CastOmen action type not implemented."

  stack-resolution:
    status: wired
    notes: >
      LIFO resolution. ResolutionStart/ResolutionComplete annotations fire.
      AbilityInstanceCreated/Deleted track stack objects.

  counterspell:
    status: wired
    notes: "Countered category fires, spell → graveyard."

  fizzle:
    status: wired
    notes: "Spell fizzles if all targets illegal. SpellResolved(fizzled=true)."

  mana-payment:
    status: wired
    notes: >
      autoTapSolution provides one-click casting (greedy solver: colored first,
