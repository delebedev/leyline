# ─── Zone Transfers ──────────────────────────────────────────────────
# Transfer categories control what animation the client plays when a card
# moves between zones. Cards always move correctly — the category just
# determines which animation fires. Missing categories fall back to
# generic ZoneTransfer (code 2).
#
# 14 of 21 categories wired. The remaining 7 still move cards correctly,
# just with a generic animation instead of the specific one.
#
# Ordered: wired first, then missing by importance.

zone-transfers:

  # ── Wired (14) ────────────────────────────────────────────────────

  cast-spell:
    status: wired
    notes: "Hand → Stack. Category 6."

  play-land:
    status: wired
    notes: "Hand → Battlefield. Category 7."

  resolve:
    status: wired
    notes: "Stack → Battlefield (or graveyard for non-permanents). Category 13."

  draw:
    status: wired
    notes: "Library → Hand. Category 10."

  destroy:
    status: wired
    notes: "Battlefield → Graveyard. Category 17."

  sacrifice:
    status: wired
    notes: "Battlefield → Graveyard (via effect). Category 18."

  discard:
    status: partial
    notes: >
      Hand → Graveyard. Category "Discard". ZoneTransfer annotation correct.
      Bug: SelectNReq (discard prompt) uses wrong context=Discard_a163/listType=Static —
      wire shows context=Resolution_a163/listType=Dynamic/optionContext=Resolution_a9d7.
      See docs/plans/2026-03-21-discard-wire-spec.md. Flag for engine-bridge agent.

  exile:
    status: wired
    notes: "Any → Exile. Category 16."

  countered:
    status: wired
    notes: "Stack → Graveyard (spell countered). Category 9."

  bounce:
    status: wired
    notes: "Battlefield → Hand/Library. Category 32."

  mill:
    status: wired
    notes: "Library → Graveyard (same owner). Category 33."

  return:
    status: wired
    notes: >
      GY/Exile → Hand/Battlefield. Category 8.
      Zone-pair heuristic in AnnotationBuilder.zoneChangedCategory().

  search:
    status: wired
    notes: >
      Library → Battlefield. Category 14.
      Zone-pair heuristic (Library→BF). Library→Hand stays Draw.
      Wire confirmed (2026-03-21): search-to-hand uses Put (19), not Search or Draw.
      Search category (14) is specifically for Library→Battlefield (ramp effects).
      Tutor/fetch-to-hand effects must emit Put (19) — requires a distinct event type
      to separate from draw.

  put:
    status: wired
    notes: >
      Generic any → any. Category 19.
      Available as TransferCategory enum; used when no specific
      zone-pair match applies and caller explicitly selects Put.

  # ── Missing — SBA reason variants ─────────────────────────────────
  # All BF→GY with different reason codes. GameEventCardChangeZone
  # doesn't carry a reason field, so distinguishing requires either
  # engine event enrichment (wide blast radius) or fragile collector-
  # side heuristics. Client plays the same death animation for all.
  # Low payoff, high cost — deliberately deferred.

  zero-toughness:
    status: missing
    notes: >
      Battlefield → Graveyard (0 toughness SBA). Category 20. Real server category string:
      "SBA_ZeroToughness" (not "ZeroToughness"). Falls back to Destroy animation. Observed
      in recordings/2026-03-21_22-31-46-game3 from Tragic Banshee (93786) ETB -1/-1.
      See docs/plans/2026-03-21-sba-zerotoughness-wire-spec.md.

  damage:
    status: missing
    notes: >
      Battlefield → Graveyard (lethal damage SBA). Category 21. Real server category string:
      "SBA_Damage" (not "Damage"). Falls back to Destroy animation. Observed x10 in
      recordings/2026-03-21_22-31-46-game3 from combat damage deaths.

  deathtouch-damage:
    status: missing
    notes: >
      Battlefield → Graveyard (deathtouch damage SBA). Category string: "SBA_Deathtouch".
      Fires alongside SBA_Damage in the same GSM diff when both combatants die in combat.
      Wire shape: ZoneTransfer annotation, affectorId ABSENT (same gap as all SBA variants),
      affectedIds=[post-ObjectIdChanged iid of killed creature]. Co-observed with Unlikely Aid
      (75505) granting deathtouch via AddAbility+LayeredEffect on Malakir Cullblade (75492, 3/3);
      Typhoid Rats (75504, 1/1 deathtouch) blocked, dealt 1 deathtouch damage → Cullblade died to
      SBA_Deathtouch, Rats dealt lethal (3 damage) → died to SBA_Damage. Both in same diff at
      seq=488 in recordings/2026-03-22_13-12-02. First observed occurrence across all recorded
      sessions. Falls back to Destroy animation (no distinct client effect vs SBA_Damage).

  zero-loyalty:
    status: missing
    notes: "Battlefield → Graveyard (0 loyalty PW). Category 24. Falls back to Destroy animation."

  legend:
    status: missing
    notes: "Battlefield → Graveyard (legend rule). Category 25. Falls back to Destroy animation."

  illegal-attachment:
    status: missing
    notes: "Battlefield → Graveyard (aura/equip lost target). Category 22. Falls back to Destroy animation."

  unattached-aura:
    status: missing
    notes: >
      Battlefield → Graveyard (aura falls off when enchanted permanent leaves BF). ZoneTransfer category
      "SBA_UnattachedAura". First recorded in 2026-03-22_23-20-47 (River's Favor fell off when stolen
      creature died). Wire: LayeredEffectDestroyed for the aura's effect fires first, then
      ObjectIdChanged + ZoneTransfer(SBA_UnattachedAura) for the aura. affectorId absent (consistent
      with all SBA categories). Fires in same diff as the SBA_Damage/SBA_ZeroToughness that killed the
      enchanted creature. See #170 for full segment wire.

  # ── N/A ───────────────────────────────────────────────────────────

  conjure:
    status: n/a
    notes: "Digital-only creation. Category 37. Not relevant for paper MTG."


# ─── Puzzle Mode ─────────────────────────────────────────────────────

puzzle-mode:
  puzzle-loading:
    status: wired
    notes: >
      Skips pre-game (no die roll, no starting player, no mulligan).
      Client receives stage=Play with pre-populated board.
      PuzzleCardRegistrar handles grpId resolution.
      just serve-puzzle path/to/puzzle.pzl works.

  puzzle-interaction:
    status: wired
    notes: >
      Same game loop as constructed after board setup.
      Test puzzles: WEB_TEST_00..02 plus custom ones.
      16 integration tests in PuzzleBridgeTest.


# ─── Visual / Animation Fidelity ────────────────────────────────────
# Things that work in the engine but the client can't display properly.

visual-fidelity:
  shuffle-animation:
    status: suppressed
    notes: >
      Shuffle annotations suppressed — client crashes without OldIds/NewIds
      detail keys. Wire confirmed (2026-03-21, Bushwhack search): OldIds =
      pre-shuffle library instanceIds, NewIds = post-shuffle instanceIds (full
      reassignment, same count). affectorId = resolving spell instanceId,
      affectedIds = [seatId]. Data must be captured around GameEventShuffle:
      snapshot library instanceIds before and after shuffle fires.
      Purely cosmetic — card movements are correct without it.

  buff-debuff-overlay:
    status: wired
    notes: >
      ModifiedPower/ModifiedToughness annotations fire on P/T deltas.
      PowerToughnessModCreated (type 71) fires with power/toughness delta
      for buff animation. Client can show +X/+X and -X/-X overlays.

  layered-effect:
    status: wired
    notes: >
      LayeredEffectCreated (18) transient + LayeredEffect (19) persistent
      fire for P/T pump effects (Giant Growth, Prowess). Multi-type array
      [ModifiedToughness, ModifiedPower, LayeredEffect] on persistent.
      PowerToughnessModCreated companion fires alongside. sourceAbilityGRPID
      wired via keyword heuristic (Prowess tested); full abilityGrpId
      mapping deferred to #72. EffectTracker diffs boosts per snapshot.
      Integration tested via prowess-annotation.pzl puzzle.

  attachment-visual:
    status: wired
    notes: >
      AttachmentCreated + persistent Attachment annotations fire on equip/enchant.
      Client renders visual link between equipment/aura and target permanent.
      Wire shape (confirmed for both equipment and aura, 2026-03-22):
      AttachmentCreated: affectorId=permanentIid, affectedIds=[hostIid].
      Persistent Attachment: same shape. No "both in affectedIds" pattern.
      ModifiedToughness+ModifiedPower+LayeredEffect pAnn co-fires with Attachment
      for stat-modifying equipment (same affectorId/affectedIds, effect_id in details).

  targeting-arrows:
    status: missing
    notes: "See targeting.targeting-arrows."

  card-highlighting:
    status: missing
    notes: >
      highlight field on actions exists but not consistently set.
      Hot/Cold distinction not wired.

  mana-pool-display:
    status: missing
    notes: "Disabled in PlayerMapper — client rendering rules unclear."

  scry:
    status: wired-broken
    notes: >
      Scry annotation (65) fires but with wrong detail keys and affectedIds.
      Wire: details.topIds="?" (string sentinel), details.bottomIds=[instanceIds...],
      affectedIds=[scried card instanceIds], affectorId=ability instanceId.
      Current code emits topCount/bottomCount (wrong keys) and affectedIds=seatId (wrong).
      GroupReq (context=Scry) only sent for human-controlled scry; AI scry resolves
      server-side with no GroupReq — only the Scry annotation appears.
      See docs/plans/2026-03-21-scry2-wire-spec.md.

  damage-numbers:
    status: wired
    notes: >
      DamageDealt annotation fires with amount, type, markDamage.
      DamagedThisTurn (type 90) persistent badge marks creatures that
      took damage in combat.

  life-total:
    status: wired
    notes: "ModifiedLife annotation fires with delta."

  counter-visuals:
    status: wired
    notes: "CounterAdded/CounterRemoved fire with type and amount."


# ─── Protocol Coverage Summary ───────────────────────────────────────
# See rosetta.md for full per-type breakdown.
#
# 94 annotation types exist in the Arena proto enum, but most are niche.
# We tier them by how often they matter in a typical Standard game.

protocol-summary:

  annotation-tiers:
    # ── Core: needed for most games, absence breaks UX ──────────────
    # 28 types. We have 27 working, 5 missing.
    core:
      have:
        - ZoneTransfer (1)          # every card move
        - DamageDealt (3)           # combat + burn
        - TappedUntapped (4)        # every mana tap, attack
        - ModifiedPower (5)         # buff/debuff overlay
        - ModifiedToughness (6)     # buff/debuff overlay
        - PhaseOrStepModified (8)   # turn structure (hardcoded)
        - ModifiedLife (10)         # life total changes
        - ObjectIdChanged (13)      # zone transfer plumbing
        - CounterAdded (16)         # +1/+1, loyalty, poison
        - CounterRemoved (17)       # counter removal
        - AbilityInstanceCreated (36) # spell/ability on stack
        - AbilityInstanceDeleted (37) # spell/ability leaves stack
        - ResolutionStart (43)      # spell resolving
        - ResolutionComplete (44)   # spell resolved
        - NewTurnStarted (48)       # turn transitions (hardcoded)
        - EnteredZoneThisTurn (63)  # summoning sickness
        - Scry (65)                 # scry visual
        - Shuffle (56)              # suppressed — crashes client without detail keys
        - CreateAttachment (11)     # equip/enchant visual link
        - RemoveAttachment (12)     # unequip/disenchant
        - Attachment (20)           # persistent attachment state
        - TokenCreated (35)         # token creation annotation
        - RevealedCardCreated (59)  # card revealed to all players
        - RevealedCardDeleted (60)  # card un-revealed
        - PowerToughnessModCreated (71)  # buff animation trigger
        - DamagedThisTurn (90)      # persistent badge on damaged creatures
        - ManaPaid (34)             # id/color/affectorId; emitted for CastSpell and mana-sacrifice (Treasure)
      missing:
        - AddAbility (9)            # "gains flying/haste/etc" — no keyword badge update
        - ControllerChanged (15)    # steal effects (Claim, Agent) — permanent doesn't move
        - CardRevealed (47)         # tutors, impulse draw — no reveal animation
        - PlayerSelectingTargets (92)  # targeting arrows during cast
        - PlayerSubmittedTargets (93)  # targeting arrows confirmed

    # ── Nice-to-have: better UX, common-ish mechanics ──────────────
    # 20 types. We have 7 working, 12 missing.
    nice-to-have:
      have:
        - Counter (14)              # persistent counter state badge
        - LayeredEffectCreated (18) # buff source tracking
        - LayeredEffect (51)        # persistent buff state (P/T pumps)
        - TokenDeleted (41)         # token leaves battlefield animation
        - SyntheticEvent (72)       # internal sequencing
        - UserActionTaken (73)      # action feedback
        - DamagedThisTurn (90)      # persistent badge on damaged creatures
      missing:
        - ModifiedColor (7)         # Painter's Servant etc
        - RemoveAbility (23)        # "loses all abilities"
        - ModifiedType (25)         # type-changing effects
        - TargetSpec (26)           # targeting UI hints
        - FaceDown (28)             # morph/manifest/disguise
        - DynamicAbility (30)       # activated ability cost display
        - CoinFlip (57)             # coin flip results
        - ReplacementEffect (62)    # replacement effect indicators
        - DieRoll (85)              # D20 cards, growing in Standard
        - LinkedDamage (87)         # damage source tracking
        - PhasedOut (95)            # phasing out visual
        - PhasedIn (96)             # phasing in visual
        - LoyaltyActivationsRemaining (97) # PW ability limits
        - RegeneratePending (99)    # regen shield visual

    # ── Niche: specific cards, digital-only, internal ───────────────
    # 47 types. We have 0. Most will never matter for paper-MTG play.
    niche:
      count: 47
      examples:
        - BoonInfo (102)            # digital-only conjure
        - DungeonStatus (86)        # D&D set mechanic
        - ClassLevel (88)           # D&D set mechanic
        - SaddledThisTurn (104)     # saddle mechanic
        - LoopCount (106)           # loop detection
        - SuppressedPowerAndToughness (108) # edge case display
        - Designation (45)          # monarch, initiative, Room door unlocks
        - SuspendLike (61)          # suspend/foretell/hideaway
        - CastingTimeOption (64)    # alt cast timing
        - MultistepEffectStarted (83) # multi-step resolution UI
      notes: >
        Full list in rosetta.md. Client degrades gracefully without these —
        game mechanics still work via the engine, just no visual flair.

  action-types:
    implemented: 5  # Cast, Play, Pass, Activate, ActivateMana (end-to-end)
    partial: 0
    total: 24
    notes: >
      Multi-face variants (10 types) deferred. FloatMana observed but not generated.

  zone-transfer-categories:
    implemented: 14
    total: 21
    notes: >
      14 wired (+ Return, Search, Put), 6 SBA reason
      variants (cosmetic — fall back to Destroy animation), 1 n/a.
      Cards always move correctly; category only affects animation.

  gre-message-types:
    server-to-client: 16  # +TimerStateMessage, +CastingTimeOptionsReq, +SelectNreq
    client-to-server: 8   # +CastingTimeOptionsResp
    missing: 1             # AssignDamageReq (GroupReq/GroupResp coded, deferred)

  game-events-wired:
    wired: 21
    total: 57
    notes: >
      Key unwired: CardPhased, SpellRemovedFromStack,
      FlipCoin, RollDie, PlayerControl.
