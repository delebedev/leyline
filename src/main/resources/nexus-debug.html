<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arena Debug Panel</title>
<style>
  :root {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --bg3: #0f3460;
    --fg: #e0e0e0;
    --fg2: #8888aa;
    --accent: #e94560;
    --blue: #4ea8de;
    --green: #56c596;
    --red: #e94560;
    --orange: #f4845f;
    --yellow: #f7d354;
    --purple: #a78bfa;
    --mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
    --border: #2a2a4e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #header h1 { font-size: 14px; color: var(--accent); font-weight: 700; }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .pill-phase { background: var(--bg3); color: var(--yellow); }
  .pill-turn { background: var(--bg3); color: var(--blue); }
  .pill-active { background: var(--bg3); color: var(--green); }
  .pill-action { background: var(--accent); color: #fff; }
  .pill-count { background: var(--bg3); color: var(--fg2); }
  #header .spacer { flex: 1; }
  #pause-btn {
    background: var(--bg3);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
  }
  #pause-btn:hover { background: var(--accent); }
  #pause-btn.paused { background: var(--red); color: #fff; }
  #toggle-ids {
    background: var(--bg3);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
  }
  #toggle-ids:hover { background: var(--purple); }
  #toggle-ids.active { background: var(--purple); color: #fff; }

  /* Main layout */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Timeline */
  #timeline {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .entry {
    border-left: 3px solid var(--border);
    padding: 6px 10px;
    margin-bottom: 2px;
    cursor: pointer;
    transition: background 0.1s;
    border-radius: 0 4px 4px 0;
  }
  .entry:hover { background: var(--bg2); }
  .entry.dir-in { border-left-color: var(--blue); }
  .entry.dir-out { border-left-color: var(--green); }
  .entry-header {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .dir-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    min-width: 28px;
    text-align: center;
  }
  .dir-in .dir-badge { background: var(--blue); color: var(--bg); }
  .dir-out .dir-badge { background: var(--green); color: var(--bg); }
  .type-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--bg3);
    color: var(--fg);
    font-weight: 600;
  }
  .type-GameStateMessage { color: var(--yellow); }
  .type-ActionsAvailableReq { color: var(--orange); }
  .type-PerformActionResp { color: var(--purple); }
  .type-DeclareAttackersReq, .type-DeclareAttackersResp { color: var(--red); }
  .type-DeclareBlockersReq, .type-DeclareBlockersResp { color: var(--red); }
  .entry-summary { color: var(--fg2); font-size: 11px; }
  .entry-meta { color: var(--fg2); font-size: 10px; opacity: 0.6; }
  .entry-ids {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .iid-chip {
    font-size: 9px;
    padding: 0 4px;
    border-radius: 3px;
    background: var(--bg3);
    color: var(--fg2);
    cursor: pointer;
  }
  .iid-chip:hover { background: var(--accent); color: #fff; }
  .iid-chip.highlight { background: var(--accent); color: #fff; }
  .entry.highlight { background: rgba(233, 69, 96, 0.15); }

  /* JSON tree */
  .json-wrap {
    display: none;
    margin-top: 6px;
    padding: 8px;
    background: var(--bg2);
    border-radius: 4px;
    overflow-x: auto;
    max-height: 400px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.5;
  }
  .entry.expanded .json-wrap { display: block; }
  .json-key { color: var(--blue); }
  .json-str { color: var(--green); }
  .json-num { color: var(--orange); }
  .json-bool { color: var(--purple); }
  .json-null { color: var(--fg2); }
  .json-bracket { color: var(--fg2); }
  .json-toggle {
    cursor: pointer;
    user-select: none;
  }
  .json-toggle:hover { text-decoration: underline; }
  .json-collapsed > .json-children { display: none; }
  .json-collapsed > .json-toggle::before { content: '▶ '; font-size: 9px; }
  .json-expanded > .json-toggle::before { content: '▼ '; font-size: 9px; }
  .json-iid { cursor: pointer; text-decoration: underline; }
  .json-iid:hover { color: var(--accent); }

  /* ID Panel (sidebar) */
  #id-panel {
    width: 340px;
    overflow-y: auto;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    padding: 8px;
    display: none;
    flex-shrink: 0;
  }
  #id-panel.visible { display: block; }
  #id-panel h2 {
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  #id-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
  }
  #id-table th {
    text-align: left;
    padding: 3px 6px;
    color: var(--fg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg2);
  }
  #id-table td {
    padding: 3px 6px;
    border-bottom: 1px solid rgba(42, 42, 78, 0.5);
  }
  .zone-Hand { color: var(--blue); }
  .zone-Library { color: var(--fg2); }
  .zone-Battlefield { color: var(--green); }
  .zone-Graveyard { color: var(--red); }
  .zone-Exile { color: var(--purple); }
  .zone-Stack { color: var(--orange); }
  #id-table tr { cursor: pointer; }
  #id-table tr:hover { background: var(--bg3); }
  #id-table tr.highlight { background: rgba(233, 69, 96, 0.15); }

  /* Log panel */
  #log-panel {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: none;
    font-size: 11px;
    line-height: 1.6;
  }
  #log-panel.visible { display: block; }
  .log-row { padding: 1px 6px; border-radius: 2px; white-space: pre-wrap; word-break: break-all; }
  .log-row:hover { background: var(--bg2); }
  .log-ts { color: var(--fg2); opacity: 0.5; margin-right: 6px; }
  .log-logger { color: var(--purple); margin-right: 6px; }
  .log-thread { color: var(--fg2); opacity: 0.4; margin-right: 6px; font-size: 9px; }
  .log-level { font-weight: 700; margin-right: 6px; min-width: 42px; display: inline-block; }
  .log-level-ERROR { color: var(--red); }
  .log-level-WARN { color: var(--orange); }
  .log-level-INFO { color: var(--green); }
  .log-level-DEBUG { color: var(--blue); }
  .log-level-TRACE { color: var(--fg2); }
  .log-msg { color: var(--fg); }
  .log-msg-ERROR { color: var(--red); }
  .log-msg-WARN { color: var(--orange); }

  /* Log filter bar */
  #log-filter-bar {
    display: none;
    gap: 6px;
    padding: 4px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }
  #log-filter-bar.visible { display: flex; }
  .level-btn {
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
  }
  .level-btn.active { border-color: var(--fg2); }
  .level-btn[data-level="ERROR"] { color: var(--red); }
  .level-btn[data-level="ERROR"].active { background: var(--red); color: #fff; }
  .level-btn[data-level="WARN"] { color: var(--orange); }
  .level-btn[data-level="WARN"].active { background: var(--orange); color: #fff; }
  .level-btn[data-level="INFO"] { color: var(--green); }
  .level-btn[data-level="INFO"].active { background: var(--green); color: var(--bg); }
  .level-btn[data-level="DEBUG"] { color: var(--blue); }
  .level-btn[data-level="DEBUG"].active { background: var(--blue); color: var(--bg); }

  /* View toggle */
  .view-tab {
    padding: 2px 10px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg2);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
  }
  .view-tab.active { background: var(--bg3); color: var(--fg); border-color: var(--fg2); }

  /* Filter bar */
  #filter-bar {
    display: flex;
    gap: 6px;
    padding: 4px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }
  #filter-bar label { color: var(--fg2); font-size: 11px; }
  #filter-input {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    width: 200px;
  }
  .dir-toggle {
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg2);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
  }
  .dir-toggle.active { background: var(--bg3); color: var(--fg); border-color: var(--fg2); }
  #clear-btn {
    background: var(--bg);
    color: var(--fg2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    margin-left: auto;
  }
  #clear-btn:hover { background: var(--accent); color: #fff; }

  /* Copy buttons */
  .copy-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    border: none;
    background: transparent;
    color: var(--fg2);
    cursor: pointer;
    border-radius: 3px;
    font-size: 11px;
    padding: 0;
    flex-shrink: 0;
    opacity: 0.4;
    transition: opacity 0.15s, background 0.15s, color 0.15s;
  }
  .copy-btn:hover { opacity: 1; background: var(--bg3); color: var(--fg); }
  .copy-btn.copied { opacity: 1; color: var(--green); }
  .entry-header .copy-btn { width: 22px; height: 22px; font-size: 12px; opacity: 0.5; }
  .json-toggle-row { display: inline-flex; align-items: center; gap: 2px; }
</style>
</head>
<body>

<div id="header">
  <h1>Arena Debug</h1>
  <span class="pill pill-phase" id="h-phase">—</span>
  <span class="pill pill-turn" id="h-turn">T0</span>
  <span class="pill pill-active" id="h-active">—</span>
  <span class="pill pill-count" id="h-count">0 msgs</span>
  <div class="spacer"></div>
  <button class="view-tab active" data-view="messages">Messages</button>
  <button class="view-tab" data-view="logs">Logs</button>
  <button id="toggle-ids">ID Map</button>
  <button id="pause-btn">Pause</button>
</div>

<div id="filter-bar">
  <label>Filter:</label>
  <input id="filter-input" type="text" placeholder="type or text...">
  <button class="dir-toggle active" data-dir="in">IN</button>
  <button class="dir-toggle active" data-dir="out">OUT</button>
  <button id="clear-btn">Clear</button>
</div>

<div id="log-filter-bar">
  <label>Level:</label>
  <button class="level-btn active" data-level="DEBUG">DEBUG</button>
  <button class="level-btn active" data-level="INFO">INFO</button>
  <button class="level-btn active" data-level="WARN">WARN</button>
  <button class="level-btn active" data-level="ERROR">ERROR</button>
  <input id="log-filter-input" type="text" placeholder="filter logger or text..." style="background:var(--bg);color:var(--fg);border:1px solid var(--border);padding:3px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;width:200px;margin-left:auto;">
</div>

<div id="main">
  <div id="timeline"></div>
  <div id="log-panel"></div>
  <div id="id-panel">
    <h2>Instance ID Map</h2>
    <table id="id-table">
      <thead><tr><th>IID</th><th>Card</th><th>Zone</th><th>GrpID</th></tr></thead>
      <tbody id="id-tbody"></tbody>
    </table>
  </div>
</div>

<script>
(function() {
  const POLL_MS = 500;
  let lastSeq = 0;
  let paused = false;
  let entries = [];
  let highlightedIid = null;
  let showIn = true, showOut = true;
  let activeView = 'messages'; // 'messages' | 'logs'
  let logEntries = [];
  let lastLogSeq = 0;
  let logLevels = { DEBUG: true, INFO: true, WARN: true, ERROR: true };

  const $timeline = document.getElementById('timeline');
  const $phase = document.getElementById('h-phase');
  const $turn = document.getElementById('h-turn');
  const $active = document.getElementById('h-active');
  const $count = document.getElementById('h-count');
  const $pauseBtn = document.getElementById('pause-btn');
  const $toggleIds = document.getElementById('toggle-ids');
  const $idPanel = document.getElementById('id-panel');
  const $idTbody = document.getElementById('id-tbody');
  const $filterInput = document.getElementById('filter-input');
  const $clearBtn = document.getElementById('clear-btn');
  const $logPanel = document.getElementById('log-panel');
  const $logFilterBar = document.getElementById('log-filter-bar');
  const $logFilterInput = document.getElementById('log-filter-input');

  // Copy to clipboard helper
  function copyToClipboard(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.textContent = '\u2713';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '\u2398'; }, 1200);
    }).catch(() => {});
  }

  function makeCopyBtn(getTextFn) {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = '\u2398';
    btn.title = 'Copy JSON';
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      copyToClipboard(getTextFn(), btn);
    });
    return btn;
  }

  // Pause/resume
  $pauseBtn.addEventListener('click', () => {
    paused = !paused;
    $pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    $pauseBtn.classList.toggle('paused', paused);
  });

  // ID panel toggle
  $toggleIds.addEventListener('click', () => {
    $idPanel.classList.toggle('visible');
    $toggleIds.classList.toggle('active');
    if ($idPanel.classList.contains('visible')) fetchIdMap();
  });

  // Direction toggles
  document.querySelectorAll('.dir-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (btn.dataset.dir === 'in') showIn = btn.classList.contains('active');
      else showOut = btn.classList.contains('active');
      renderTimeline();
    });
  });

  // Filter
  $filterInput.addEventListener('input', () => renderTimeline());

  // Clear
  $clearBtn.addEventListener('click', () => {
    entries = [];
    renderTimeline();
  });

  // View tabs (Messages / Logs)
  document.querySelectorAll('.view-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeView = btn.dataset.view;
      document.querySelectorAll('.view-tab').forEach(b => b.classList.toggle('active', b.dataset.view === activeView));
      const isMsgs = activeView === 'messages';
      $timeline.style.display = isMsgs ? '' : 'none';
      document.getElementById('filter-bar').style.display = isMsgs ? '' : 'none';
      $logPanel.classList.toggle('visible', !isMsgs);
      $logFilterBar.classList.toggle('visible', !isMsgs);
      if (!isMsgs) renderLogs();
    });
  });

  // Log level toggles
  document.querySelectorAll('.level-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      logLevels[btn.dataset.level] = btn.classList.contains('active');
      renderLogs();
    });
  });

  // Log text filter
  $logFilterInput.addEventListener('input', () => renderLogs());

  // Polling
  async function poll() {
    if (paused) { setTimeout(poll, POLL_MS); return; }
    try {
      const fetches = [
        fetch('/api/messages?since=' + lastSeq),
        fetch('/api/state'),
        fetch('/api/logs?since=' + lastLogSeq + '&level=DEBUG'),
      ];
      const [msgResp, stateResp, logResp] = await Promise.all(fetches);
      const newEntries = await msgResp.json();
      const state = await stateResp.json();
      const newLogs = await logResp.json();

      if (newEntries.length > 0) {
        for (const e of newEntries) {
          entries.push(e);
          if (e.seq > lastSeq) lastSeq = e.seq;
        }
        // Cap client-side
        if (entries.length > 1000) entries = entries.slice(-500);
        renderTimeline();
      }

      if (newLogs.length > 0) {
        for (const l of newLogs) {
          logEntries.push(l);
          if (l.seq > lastLogSeq) lastLogSeq = l.seq;
        }
        if (logEntries.length > 5000) logEntries = logEntries.slice(-2000);
        if (activeView === 'logs') renderLogs();
      }

      // Update header
      $phase.textContent = state.phase || '—';
      $turn.textContent = 'T' + state.turn;
      $active.textContent = state.activePlayer || '—';
      $count.textContent = state.entryCount + ' msgs';

      if ($idPanel.classList.contains('visible')) fetchIdMap();
    } catch (e) {
      // server not up yet, ignore
    }
    setTimeout(poll, POLL_MS);
  }

  function renderTimeline() {
    const filter = $filterInput.value.toLowerCase();
    const frag = document.createDocumentFragment();

    // Render newest first
    for (let i = entries.length - 1; i >= 0; i--) {
      const e = entries[i];
      if (e.dir === 'in' && !showIn) continue;
      if (e.dir === 'out' && !showOut) continue;
      if (filter && !e.type.toLowerCase().includes(filter) && !e.summary.toLowerCase().includes(filter)) continue;

      const div = document.createElement('div');
      div.className = 'entry dir-' + e.dir;
      div.dataset.seq = e.seq;

      const isHl = highlightedIid !== null && e.instanceIds.includes(highlightedIid);
      if (isHl) div.classList.add('highlight');

      // Header row
      const hdr = document.createElement('div');
      hdr.className = 'entry-header';

      const dirBadge = document.createElement('span');
      dirBadge.className = 'dir-badge';
      dirBadge.textContent = e.dir === 'in' ? 'IN' : 'OUT';
      hdr.appendChild(dirBadge);

      const typeBadge = document.createElement('span');
      typeBadge.className = 'type-badge type-' + e.type;
      typeBadge.textContent = e.type;
      hdr.appendChild(typeBadge);

      const summary = document.createElement('span');
      summary.className = 'entry-summary';
      summary.textContent = e.summary;
      hdr.appendChild(summary);

      const meta = document.createElement('span');
      meta.className = 'entry-meta';
      meta.textContent = 'seat=' + e.seatId + ' gs=' + e.gsId + ' #' + e.seq;
      hdr.appendChild(meta);

      hdr.appendChild(makeCopyBtn(() => {
        try { return JSON.stringify(JSON.parse(e.json), null, 2); } catch { return e.json; }
      }));

      div.appendChild(hdr);

      // Instance ID chips
      if (e.instanceIds.length > 0) {
        const idsDiv = document.createElement('div');
        idsDiv.className = 'entry-ids';
        for (const iid of e.instanceIds.slice(0, 20)) {
          const chip = document.createElement('span');
          chip.className = 'iid-chip';
          if (highlightedIid === iid) chip.classList.add('highlight');
          chip.textContent = iid;
          chip.addEventListener('click', (ev) => {
            ev.stopPropagation();
            highlightIid(iid);
          });
          idsDiv.appendChild(chip);
        }
        if (e.instanceIds.length > 20) {
          const more = document.createElement('span');
          more.className = 'iid-chip';
          more.textContent = '+' + (e.instanceIds.length - 20);
          idsDiv.appendChild(more);
        }
        div.appendChild(idsDiv);
      }

      // JSON tree (lazy)
      const jsonWrap = document.createElement('div');
      jsonWrap.className = 'json-wrap';
      div.appendChild(jsonWrap);

      div.addEventListener('click', () => {
        const wasExpanded = div.classList.contains('expanded');
        div.classList.toggle('expanded');
        if (!wasExpanded && jsonWrap.children.length === 0) {
          try {
            const parsed = JSON.parse(e.json);
            jsonWrap.appendChild(buildJsonTree(parsed, 0));
          } catch {
            jsonWrap.textContent = e.json;
          }
        }
      });

      frag.appendChild(div);
    }

    $timeline.innerHTML = '';
    $timeline.appendChild(frag);
  }

  // JSON tree builder
  function buildJsonTree(val, depth) {
    if (val === null) {
      const s = document.createElement('span');
      s.className = 'json-null';
      s.textContent = 'null';
      return s;
    }
    if (typeof val === 'boolean') {
      const s = document.createElement('span');
      s.className = 'json-bool';
      s.textContent = String(val);
      return s;
    }
    if (typeof val === 'number') {
      const s = document.createElement('span');
      s.className = 'json-num';
      s.textContent = String(val);
      // Check if this could be an instanceId (range 100-200000)
      if (val >= 100 && val < 200000 && Number.isInteger(val)) {
        s.classList.add('json-iid');
        s.addEventListener('click', (ev) => {
          ev.stopPropagation();
          highlightIid(val);
        });
      }
      return s;
    }
    if (typeof val === 'string') {
      const s = document.createElement('span');
      s.className = 'json-str';
      s.textContent = '"' + val + '"';
      return s;
    }
    if (Array.isArray(val)) {
      if (val.length === 0) {
        const s = document.createElement('span');
        s.className = 'json-bracket';
        s.textContent = '[]';
        return s;
      }
      const container = document.createElement('span');
      container.className = 'json-expanded';

      const toggleRow = document.createElement('span');
      toggleRow.className = 'json-toggle-row';
      const toggle = document.createElement('span');
      toggle.className = 'json-toggle json-bracket';
      toggle.textContent = '[' + val.length + ']';
      toggle.addEventListener('click', (ev) => {
        ev.stopPropagation();
        container.classList.toggle('json-collapsed');
        container.classList.toggle('json-expanded');
      });
      toggleRow.appendChild(toggle);
      toggleRow.appendChild(makeCopyBtn(() => JSON.stringify(val, null, 2)));
      container.appendChild(toggleRow);

      const children = document.createElement('div');
      children.className = 'json-children';
      children.style.paddingLeft = '16px';
      for (let i = 0; i < val.length; i++) {
        const row = document.createElement('div');
        row.appendChild(buildJsonTree(val[i], depth + 1));
        if (i < val.length - 1) {
          const comma = document.createElement('span');
          comma.className = 'json-bracket';
          comma.textContent = ',';
          row.appendChild(comma);
        }
        children.appendChild(row);
      }
      container.appendChild(children);

      // Auto-collapse deep arrays
      if (depth > 2 || val.length > 10) {
        container.classList.remove('json-expanded');
        container.classList.add('json-collapsed');
      }
      return container;
    }
    if (typeof val === 'object') {
      const keys = Object.keys(val);
      if (keys.length === 0) {
        const s = document.createElement('span');
        s.className = 'json-bracket';
        s.textContent = '{}';
        return s;
      }
      const container = document.createElement('span');
      container.className = 'json-expanded';

      const toggleRow = document.createElement('span');
      toggleRow.className = 'json-toggle-row';
      const toggle = document.createElement('span');
      toggle.className = 'json-toggle json-bracket';
      toggle.textContent = '{' + keys.length + '}';
      toggle.addEventListener('click', (ev) => {
        ev.stopPropagation();
        container.classList.toggle('json-collapsed');
        container.classList.toggle('json-expanded');
      });
      toggleRow.appendChild(toggle);
      toggleRow.appendChild(makeCopyBtn(() => JSON.stringify(val, null, 2)));
      container.appendChild(toggleRow);

      const children = document.createElement('div');
      children.className = 'json-children';
      children.style.paddingLeft = '16px';
      for (let i = 0; i < keys.length; i++) {
        const row = document.createElement('div');
        const key = document.createElement('span');
        key.className = 'json-key';
        key.textContent = keys[i];
        row.appendChild(key);
        const colon = document.createElement('span');
        colon.textContent = ': ';
        row.appendChild(colon);
        row.appendChild(buildJsonTree(val[keys[i]], depth + 1));
        if (i < keys.length - 1) {
          const comma = document.createElement('span');
          comma.className = 'json-bracket';
          comma.textContent = ',';
          row.appendChild(comma);
        }
        children.appendChild(row);
      }
      container.appendChild(children);

      if (depth > 3) {
        container.classList.remove('json-expanded');
        container.classList.add('json-collapsed');
      }
      return container;
    }
    const s = document.createElement('span');
    s.textContent = String(val);
    return s;
  }

  // Highlight instanceId across all entries
  function highlightIid(iid) {
    highlightedIid = (highlightedIid === iid) ? null : iid;
    renderTimeline();
    // Also highlight in ID table
    document.querySelectorAll('#id-tbody tr').forEach(tr => {
      const rowIid = parseInt(tr.children[0]?.textContent);
      tr.classList.toggle('highlight', highlightedIid === rowIid);
    });
  }

  // ID map fetch
  async function fetchIdMap() {
    try {
      const resp = await fetch('/api/id-map');
      const data = await resp.json();
      $idTbody.innerHTML = '';
      for (const row of data) {
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + row.instanceId + '</td>' +
          '<td>' + esc(row.cardName) + '</td>' +
          '<td class="zone-' + row.zone + '">' + row.zone + '</td>' +
          '<td>' + row.grpId + '</td>';
        tr.addEventListener('click', () => highlightIid(row.instanceId));
        if (highlightedIid === row.instanceId) tr.classList.add('highlight');
        $idTbody.appendChild(tr);
      }
    } catch (e) { /* ignore */ }
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // Log renderer
  function renderLogs() {
    const filter = ($logFilterInput?.value || '').toLowerCase();
    const frag = document.createDocumentFragment();
    const wasAtBottom = $logPanel.scrollHeight - $logPanel.scrollTop - $logPanel.clientHeight < 40;

    for (let i = logEntries.length - 1; i >= 0; i--) {
      const l = logEntries[i];
      if (!logLevels[l.level]) continue;
      if (filter && !l.logger.toLowerCase().includes(filter) && !l.message.toLowerCase().includes(filter)) continue;

      const row = document.createElement('div');
      row.className = 'log-row';

      const ts = new Date(l.ts);
      const tsStr = ts.toTimeString().slice(0, 8) + '.' + String(ts.getMilliseconds()).padStart(3, '0');

      row.innerHTML =
        '<span class="log-ts">' + tsStr + '</span>' +
        '<span class="log-level log-level-' + l.level + '">' + l.level + '</span>' +
        '<span class="log-thread">[' + esc(l.thread) + ']</span>' +
        '<span class="log-logger">' + esc(l.logger) + '</span>' +
        '<span class="log-msg log-msg-' + l.level + '">' + esc(l.message) + '</span>';
      frag.appendChild(row);
    }

    $logPanel.innerHTML = '';
    $logPanel.appendChild(frag);
  }

  // Start
  poll();
})();
</script>
</body>
</html>
